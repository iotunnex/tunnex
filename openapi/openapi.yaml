openapi: 3.0.3
info:
  title: Tunnex API
  version: 0.1.0
  description: |
    Control-plane API for Tunnex.io. This spec is the single source of truth:
    the Go server types/handlers and the TypeScript client are generated from it
    (`make generate`), and drift fails the build (`make generate-check`).
servers:
  - url: /
    description: Same-origin (served behind the edge nginx)

# Endpoints require a session cookie by default; public ones set `security: []`.
security:
  - cookieAuth: []

paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness probe
      description: Reports process liveness. No external dependencies are checked.
      tags: [system]
      security: []
      responses:
        "200":
          description: The service is alive.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/auth/signup:
    post:
      operationId: signup
      summary: Create a local account (sends a verification email)
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignupRequest" }
      responses:
        "202":
          description: Accepted. Returns the same generic result whether or not the email was already registered.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/login:
    post:
      operationId: login
      summary: Verify credentials
      description: "S2.1 verifies credentials; S2.2 establishes the session cookie."
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Credentials valid.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthUser" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/verify-email:
    post:
      operationId: verifyEmail
      summary: Verify an email address with a token
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TokenRequest" }
      responses:
        "200":
          description: Verified.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/password-reset:
    post:
      operationId: requestPasswordReset
      summary: Request a password-reset email
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PasswordResetRequest" }
      responses:
        "202":
          description: Accepted. Generic result regardless of whether the email exists.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/password-reset/confirm:
    post:
      operationId: confirmPasswordReset
      summary: Set a new password using a reset token
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PasswordResetConfirmRequest" }
      responses:
        "200":
          description: Password updated.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/meta:
    get:
      operationId: getMeta
      summary: Public deployment metadata (edition, enabled SSO providers)
      description: Lets the SPA gate edition-only UI (e.g. hide SSO in the open build) without a build-time bundle fork.
      tags: [meta]
      security: []
      responses:
        "200":
          description: Deployment metadata.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Meta" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/verify-email/resend:
    post:
      operationId: resendVerification
      summary: Resend the current user's email-verification link
      description: Idempotent; a no-op (still 202) if already verified. Requires a session.
      tags: [auth]
      responses:
        "202":
          description: If verification is pending, an email has been sent.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/me:
    get:
      operationId: currentUser
      summary: The current authenticated user
      description: Returns the session's user so the SPA can rehydrate auth on load; 401 if there is no valid session.
      tags: [auth]
      responses:
        "200":
          description: The authenticated user.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthUser" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Revoke the current session
      description: Idempotent — clears the cookie and revokes the session if present.
      tags: [auth]
      security: []
      responses:
        "204":
          description: Logged out.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/sso/{provider}/start:
    get:
      operationId: startSsoLogin
      summary: Begin an SSO login (enterprise)
      tags: [sso]
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string, enum: [google, microsoft] }
        - name: org
          in: query
          required: true
          description: Organization slug whose SSO config to use.
          schema: { type: string }
      responses:
        "200":
          description: The IdP redirect URL for the client to navigate to.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SsoRedirect" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/sso/{provider}/callback:
    get:
      operationId: ssoCallback
      summary: SSO callback (enterprise)
      tags: [sso]
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string, enum: [google, microsoft] }
        - name: code
          in: query
          required: true
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
      responses:
        "302":
          description: Authenticated — session cookie set, browser redirected to the app.
          headers:
            Location: { schema: { type: string }, required: true }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/sso/{provider}:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: provider
        in: path
        required: true
        schema: { type: string, enum: [google, microsoft] }
    put:
      operationId: setSsoConfig
      summary: Configure an SSO provider for an organization (enterprise)
      tags: [sso]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SsoConfigRequest" }
      responses:
        "204":
          description: Saved.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/agent/enroll:
    post:
      operationId: enrollAgent
      summary: Enroll a tunnex-node agent with a join token
      tags: [nodes]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EnrollRequest" }
      responses:
        "200":
          description: Enrolled — returns the signed agent certificate and the CA.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/nodes:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listNodes
      summary: List enrolled nodes
      tags: [nodes]
      responses:
        "200":
          description: Nodes.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Node" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/nodes/join-token:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: issueJoinToken
      summary: Issue a single-use node join token
      tags: [nodes]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JoinTokenRequest" }
      responses:
        "201":
          description: The join token (shown once).
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JoinTokenResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/nodes/{nodeId}/revoke:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: nodeId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: revokeNode
      summary: Revoke a node (renewal will be refused)
      tags: [nodes]
      responses:
        "204":
          description: Revoked.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/devices:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listDevices
      summary: List devices (own devices for members; all for admins)
      tags: [devices]
      responses:
        "200":
          description: Devices.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Device" } }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createDevice
      summary: Create a device/peer bound to the owning user
      tags: [devices]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateDeviceRequest" }
      responses:
        "201":
          description: The created device (with a one-time private key if server-generated).
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateDeviceResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/devices/{deviceId}/revoke:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: deviceId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: revokeDevice
      summary: Revoke a device (peer removed from the gateway within seconds)
      tags: [devices]
      responses:
        "204":
          description: Revoked.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/invitations/accept:
    post:
      operationId: acceptInvitation
      summary: Accept an invitation
      tags: [invitations]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AcceptInviteRequest" }
      responses:
        "200":
          description: Accepted; the account is a member.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/invitations:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: createInvitation
      summary: Invite a user to the organization
      tags: [invitations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InviteRequest" }
      responses:
        "202":
          description: Invitation sent.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/invitations/resend:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: resendInvitation
      summary: Resend an invitation (new token, old invalidated)
      tags: [invitations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmailRequest" }
      responses:
        "202":
          description: Invitation re-sent.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/invitations/revoke:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: revokeInvitation
      summary: Revoke a pending invitation
      tags: [invitations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmailRequest" }
      responses:
        "204":
          description: Revoked.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/members/{userId}/deactivate:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: userId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: deactivateMember
      summary: Deactivate a member's account (freezes access, revokes sessions)
      tags: [members]
      responses:
        "204":
          description: Deactivated.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/members/{userId}/reactivate:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: userId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: reactivateMember
      summary: Reactivate a deactivated member
      tags: [members]
      responses:
        "204":
          description: Reactivated.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/domains:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: createDomainClaim
      summary: Claim an email domain for capture (enterprise)
      tags: [sso]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DomainClaimRequest" }
      responses:
        "201":
          description: Claim created — publish the returned TXT record, then verify.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DomainClaimResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/domains/verify:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: verifyDomainClaim
      summary: Verify a claimed domain via its DNS TXT record (enterprise)
      tags: [sso]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DomainVerifyRequest" }
      responses:
        "200":
          description: Verified.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations:
    get:
      operationId: listOrganizations
      summary: List organizations
      description: Lists the organizations the authenticated user belongs to.
      tags: [organizations]
      responses:
        "200":
          description: Organizations.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organization"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createOrganization
      summary: Create an organization
      description: |
        Creates an organization. In the open edition this fails with
        `org_limit_reached` once one organization exists; the enterprise build
        allows multiple.
      tags: [organizations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: The created organization.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/organizations/{orgId}:
    parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getOrganization
      summary: Get an organization
      tags: [organizations]
      responses:
        "200":
          description: The organization.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        default:
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateOrganization
      summary: Update organization settings (name only; slug is immutable)
      tags: [organizations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationRequest"
      responses:
        "200":
          description: The updated organization.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteOrganization
      summary: Soft-delete an organization
      tags: [organizations]
      responses:
        "204":
          description: Deleted.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
        default:
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: tunnex_session

  headers:
    RequestId:
      description: Correlation ID for this request; also appears in server logs.
      schema:
        type: string
      required: true

  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [ok]
          description: Liveness status.
        service:
          type: string
          description: Reporting service name.
          example: tunnex-api
        request_id:
          type: string
          description: Correlation ID for this request.

    Organization:
      type: object
      required: [id, name, slug, created_at, updated_at]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateOrganizationRequest:
      type: object
      required: [name, slug]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        slug:
          type: string
          minLength: 1
          maxLength: 63
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"

    UpdateOrganizationRequest:
      type: object
      required: [name]
      additionalProperties: false
      description: Only the name is mutable; the slug is fixed at creation.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200

    GenericMessage:
      type: object
      required: [message]
      additionalProperties: false
      properties:
        message: { type: string }

    SsoRedirect:
      type: object
      required: [redirect_url]
      additionalProperties: false
      properties:
        redirect_url: { type: string }

    EnrollRequest:
      type: object
      required: [join_token, csr, node_name, agent_version, protocol_version]
      additionalProperties: false
      properties:
        join_token: { type: string, minLength: 1, maxLength: 200 }
        csr: { type: string, description: "PEM-encoded certificate signing request" }
        node_name: { type: string, minLength: 1, maxLength: 100 }
        agent_version: { type: string, maxLength: 50 }
        protocol_version: { type: integer }

    EnrollResponse:
      type: object
      required: [node_id, certificate, ca_certificate]
      additionalProperties: false
      properties:
        node_id: { type: string, format: uuid }
        certificate: { type: string, description: "PEM agent certificate" }
        ca_certificate: { type: string, description: "PEM CA certificate" }

    Node:
      type: object
      required: [id, name, status, agent_version, enrolled_at]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        status: { type: string, enum: [active, revoked] }
        agent_version: { type: string }
        enrolled_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }

    JoinTokenRequest:
      type: object
      additionalProperties: false
      properties:
        node_name: { type: string, maxLength: 100 }

    JoinTokenResponse:
      type: object
      required: [join_token]
      additionalProperties: false
      properties:
        join_token: { type: string }

    Device:
      type: object
      required: [id, user_id, node_id, name, status, public_key, created_at]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        node_id: { type: string, format: uuid }
        name: { type: string }
        platform: { type: string }
        public_key: { type: string }
        assigned_ip: { type: string }
        status: { type: string, enum: [active, revoked] }
        created_at: { type: string, format: date-time }
        # Live status (S3.6). last_handshake_at is the most recent WireGuard
        # handshake; `online` is DERIVED from its recency (WireGuard has no
        # connection state) — treat it as an approximation. rx/tx are raw byte
        # gauges that reset when the interface restarts (display only).
        last_handshake_at: { type: string, format: date-time }
        online: { type: boolean }
        rx_bytes: { type: integer, format: int64 }
        tx_bytes: { type: integer, format: int64 }

    CreateDeviceRequest:
      type: object
      required: [name, node_id]
      additionalProperties: false
      properties:
        name: { type: string, maxLength: 100 }
        node_id: { type: string, format: uuid }
        platform: { type: string, maxLength: 50 }
        # Omit public_key to have the server generate the keypair (browser flow):
        # the private key is then returned ONCE and never stored.
        public_key: { type: string }
        # Admins may create a device on behalf of another org member; omit for self.
        user_id: { type: string, format: uuid }
        # Route all traffic (0.0.0.0/0). Default false = split-tunnel (org network only).
        full_tunnel: { type: boolean }

    CreateDeviceResponse:
      type: object
      required: [device]
      additionalProperties: false
      properties:
        device: { $ref: "#/components/schemas/Device" }
        # Present ONLY for the server-generated flow; shown once, never stored.
        private_key: { type: string }
        # The ready-to-use wg-quick .conf (server-generated flow only), shown once.
        config: { type: string }

    InviteRequest:
      type: object
      required: [email, role]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 320 }
        role: { type: string, enum: [owner, admin, member] }

    EmailRequest:
      type: object
      required: [email]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 320 }

    AcceptInviteRequest:
      type: object
      required: [token]
      additionalProperties: false
      properties:
        token: { type: string, minLength: 1, maxLength: 200 }
        name: { type: string, maxLength: 200 }
        password: { type: string, minLength: 12, maxLength: 200 }

    DomainClaimRequest:
      type: object
      required: [domain]
      additionalProperties: false
      properties:
        domain: { type: string, minLength: 3, maxLength: 253 }

    DomainClaimResponse:
      type: object
      required: [txt_record]
      additionalProperties: false
      properties:
        txt_record:
          type: string
          description: Publish this exact value as a TXT record on the domain, then verify.

    DomainVerifyRequest:
      type: object
      required: [domain]
      additionalProperties: false
      properties:
        domain: { type: string, minLength: 3, maxLength: 253 }

    SsoConfigRequest:
      type: object
      required: [client_id, client_secret, enabled]
      additionalProperties: false
      properties:
        client_id: { type: string, minLength: 1, maxLength: 500 }
        client_secret: { type: string, minLength: 1, maxLength: 500 }
        tenant_id:
          type: string
          maxLength: 200
          description: Required for Microsoft (the org's Entra tenant ID); unused by Google.
        enabled: { type: boolean }

    AuthUser:
      type: object
      required: [id, email, email_verified]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        email_verified: { type: boolean }

    Meta:
      type: object
      required: [edition, sso_providers]
      additionalProperties: false
      properties:
        edition: { type: string, enum: [open, enterprise] }
        # SSO providers this deployment can offer (empty in the open edition, so
        # the SPA hides SSO entirely rather than showing buttons that error).
        sso_providers:
          type: array
          items: { type: string, enum: [google, microsoft] }

    SignupRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, minLength: 12, maxLength: 200 }
        name: { type: string, maxLength: 200 }

    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, maxLength: 200 }

    TokenRequest:
      type: object
      required: [token]
      additionalProperties: false
      properties:
        token: { type: string, minLength: 1, maxLength: 200 }

    PasswordResetRequest:
      type: object
      required: [email]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 320 }

    PasswordResetConfirmRequest:
      type: object
      required: [token, password]
      additionalProperties: false
      properties:
        token: { type: string, minLength: 1, maxLength: 200 }
        password: { type: string, minLength: 12, maxLength: 200 }

    Error:
      type: object
      description: |
        Standard error envelope for every non-2xx response. Chosen over bare
        RFC 7807 so the correlation `request_id` is a first-class field the SPA
        and CLI can surface directly; `code` is stable for programmatic handling.
      required: [error]
      additionalProperties: false
      properties:
        error:
          type: object
          required: [code, message]
          additionalProperties: false
          properties:
            code:
              type: string
              description: Stable, machine-readable error code.
              example: not_found
            message:
              type: string
              description: Human-readable explanation.
            request_id:
              type: string
              description: Correlation ID; match against server logs.
            details:
              type: array
              description: Field-level problems (e.g. validation failures).
              items:
                $ref: "#/components/schemas/ErrorDetail"

    ErrorDetail:
      type: object
      required: [message]
      additionalProperties: false
      properties:
        field:
          type: string
          description: Dotted path to the offending field, when applicable.
        message:
          type: string
          description: What is wrong with this field.

  responses:
    Error:
      description: Error response.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
