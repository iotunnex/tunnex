      tags: [organizations]
      responses:
        "204":
          description: Deleted.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/organizations/{orgId}/pool-cidr:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    put:
      # EDITION-NEUTRAL: the address allocator is core/open (S3.5), so resize has
      # no edition gate. Do not add one.
      operationId: resizePool
      summary: Resize the org's WireGuard address pool (grow-superset or shrink-subset)
      tags: [organizations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PoolCidrRequest" }
      responses:
        "200":
          description: The updated organization (also returned unchanged for an idempotent no-op resize).
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Organization" }
        "409":
          description: The shrink would strand live allocations; none were changed.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResizeConflict" }
        default:
          $ref: "#/components/responses/Error"

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: tunnex_session
    # CLI credential (tnx_...). bearer ≡ cookie on every authenticated endpoint;
    # the ONLY exceptions are argued on the ops themselves (cliAuthorize +
    # cliDeviceApprove — credential minting must not be reachable from a bearer).
    bearerAuth:
      type: http
      scheme: bearer

  headers:
    RequestId:
      description: Correlation ID for this request; also appears in server logs.
      schema:
        type: string
      required: true

  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [ok]
          description: Liveness status.
        service:
          type: string
          description: Reporting service name.
          example: tunnex-api
        request_id:
          type: string
          description: Correlation ID for this request.

    Organization:
      type: object
      required: [id, name, slug, pool_cidr, created_at, updated_at]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        pool_cidr:
          type: string
          description: The org's flat WireGuard address pool (IPv4 CIDR).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PoolCidrRequest:
      type: object
      required: [cidr]
      additionalProperties: false
      properties:
        cidr: { type: string, description: New pool CIDR (IPv4). Must contain or be contained by the current range. }

    # ── Zero Trust policy (S7.1, enterprise) ──────────────────────────────────
    UserGroup:
      type: object
      required: [id, org_id, name, description, created_at, updated_at]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    GroupRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, maxLength: 500 }

    GroupMember:
      type: object
      required: [user_id, email, name, added_at]
      additionalProperties: false
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string }
        name: { type: string }
        added_at: { type: string, format: date-time }

    AddGroupMemberRequest:
      type: object
      required: [user_id]
      additionalProperties: false
      properties:
        user_id: { type: string, format: uuid }

    Resource:
      type: object
      required: [id, org_id, name, cidr, protocol, created_at, updated_at]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string }
        cidr: { type: string, description: "Destination prefix (e.g. 10.0.5.0/24, 0.0.0.0/0)." }
        protocol: { type: string, enum: [any, tcp, udp] }
        port_low: { type: integer, nullable: true, minimum: 1, maximum: 65535 }
        port_high: { type: integer, nullable: true, minimum: 1, maximum: 65535 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ResourceRequest:
      type: object
      required: [name, cidr, protocol]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        cidr: { type: string }
        protocol: { type: string, enum: [any, tcp, udp] }
        port_low: { type: integer, nullable: true, minimum: 1, maximum: 65535 }
        port_high: { type: integer, nullable: true, minimum: 1, maximum: 65535 }

    PolicyRule:
      type: object
      required: [id, org_id, src_group_id, dst_kind, created_at]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        src_group_id: { type: string, format: uuid }
        dst_kind: { type: string, enum: [resource, group] }
        dst_resource_id: { type: string, format: uuid, nullable: true }
        dst_group_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }

    CreatePolicyRuleRequest:
      type: object
      required: [src_group_id, dst_kind]
      additionalProperties: false
      properties:
        src_group_id: { type: string, format: uuid }
        dst_kind: { type: string, enum: [resource, group] }
        dst_resource_id: { type: string, format: uuid, nullable: true, description: Required when dst_kind=resource. }
        dst_group_id: { type: string, format: uuid, nullable: true, description: Required when dst_kind=group. }

    ZeroTrustMode:
      type: object
      required: [mode]
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [off, enforcing]
          description: "off = legacy blanket mesh; enforcing = default-deny + compiled allows."
        affected_full_tunnel_devices:
          type: array
          description: >
            On ENABLING enforcing (PUT only), the full-tunnel devices whose internet egress
            becomes policy-governed by the flip — the blast radius for the warn-and-confirm.
            The server obeys regardless; this is the honest count + names. Absent/empty when
            disabling or when none are affected. State name for these = egress_policy_denied
            (distinct from gateway_no_egress: the gateway CAN egress, policy is denying it).
          items: { $ref: "#/components/schemas/AffectedDevice" }

    AffectedDevice:
      type: object
      required: [id, name]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        name: { type: string }

    # One stranded allocation. reason distinguishes out_of_range (visibly outside
    # the new range) from reserved_collision (numerically INSIDE it but on the new
    # network/gateway/broadcast — looks fine to the eye, still stranded).
    Orphan:
      type: object
      required: [device_id, name, assigned_ip, reason]
      additionalProperties: false
      properties:
        device_id: { type: string, format: uuid }
        name: { type: string }
        assigned_ip: { type: string }
        reason: { type: string, enum: [out_of_range, reserved_collision] }

    # 409 body when a resize would strand live allocations. orphan_count is the
    # true total; orphans is capped (the caller renders the list, the count is honest).
    ResizeConflict:
      type: object
      required: [orphan_count, orphans]
      additionalProperties: false
      properties:
        orphan_count: { type: integer }
        orphans:
          type: array
          items: { $ref: "#/components/schemas/Orphan" }

    CreateOrganizationRequest:
      type: object
      required: [name, slug]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        slug:
          type: string
          minLength: 1
          maxLength: 63
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"

    UpdateOrganizationRequest:
      type: object
      required: [name]
      additionalProperties: false
      description: Only the name is mutable; the slug is fixed at creation.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200

    # ---- CLI credential flow (S5.1) ----------------------------------------
    CliAuthorizeRequest:
      type: object
      required: [redirect_uri, code_challenge, state]
      additionalProperties: false
      properties:
        redirect_uri:
          type: string
          maxLength: 200
          description: >
            Loopback only — http://127.0.0.1:<port>/callback or
            http://[::1]:<port>/callback (any port, exactly that path; hostnames
            incl. "localhost" are refused — DNS-spoofable).
        code_challenge:
          type: string
          minLength: 43
          maxLength: 128
          description: PKCE S256 challenge (base64url SHA-256 of the CLI's verifier).
        state:
          type: string
          minLength: 1
          maxLength: 200
          description: Echoed to the loopback callback verbatim (CLI-side correlation/CSRF).

    CliAuthorizeResponse:
      type: object
      x-go-name: CliAuthorizeResult
      required: [code, state, expires_in]
      additionalProperties: false
      properties:
        code: { type: string, description: "One-time authorization code (single-use, hashed at rest)." }
        state: { type: string }
        expires_in: { type: integer, description: "Code lifetime in seconds (60)." }

    CliTokenRequest:
      type: object
      required: [code, code_verifier, redirect_uri]
      additionalProperties: false
      properties:
        code: { type: string, minLength: 1, maxLength: 200 }
        code_verifier: { type: string, minLength: 43, maxLength: 128 }
        redirect_uri:
          type: string
          maxLength: 200
          description: Must EXACTLY match the redirect the code was bound to at mint.

    # WRITE-ONCE SECRET: the token appears ONLY here, never in any GET/list
    # response type (structural absence — the proof-of-secret convention).
    # x-go-name avoids colliding with oapi-codegen's generated CliTokenResponse
    # operation wrapper (Go naming only; the wire contract is unchanged).
    CliTokenResponse:
      type: object
      x-go-name: CliCredentialGrant
      required: [token, expires_at, fingerprint]
      additionalProperties: false
      properties:
        token:
          type: string
          description: >
            The dedicated CLI bearer credential, prefixed tnx_ (secret-scanner
            matchable). Shown exactly once; stored hashed; send as
            "Authorization: Bearer <token>".
        expires_at: { type: string, format: date-time, description: "Absolute expiry (90 days)." }
        fingerprint: { type: string, description: "Keyed 12-hex proof-of-secret; matches audit rows." }

    CliCredential:
      type: object
      required: [id, name, fingerprint, created_at, expires_at]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        name: { type: string, description: "Client-supplied label (e.g. hostname) or a default." }
        fingerprint: { type: string }
        created_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }

    CliDeviceStartResponse:
      type: object
      x-go-name: CliDeviceStartResult
      required: [device_code, user_code, verification_uri, interval, expires_in]
      additionalProperties: false
      properties:
        device_code: { type: string, description: "Poll credential; never shown to the user." }
        user_code: { type: string, description: "Short human code entered in the browser." }
        verification_uri: { type: string }
        interval: { type: integer, description: "Minimum poll interval in seconds." }
        expires_in: { type: integer }

    CliDeviceApproveRequest:
      type: object
      required: [user_code]
      additionalProperties: false
      properties:
        user_code: { type: string, minLength: 1, maxLength: 32 }

    CliDeviceTokenRequest:
      type: object
      required: [device_code]
      additionalProperties: false
      properties:
        device_code: { type: string, minLength: 1, maxLength: 200 }

    GenericMessage:
      type: object
      required: [message]
      additionalProperties: false
      properties:
        message: { type: string }

    InviteCreated:
      type: object
      required: [message, invite_token]
      additionalProperties: false
      properties:
        message: { type: string }
        invite_token:
          type: string
          description: >-
            Raw one-time accept token. The dashboard builds the accept link
            (origin + /accept-invite?token=…) for the admin to hand to the invitee
            — the SMTP-less delivery path. Also emailed when SMTP is configured.
            Shown once; not retrievable later.

    SsoRedirect:
      type: object
      required: [redirect_url]
      additionalProperties: false
      properties:
        redirect_url: { type: string }

    EnrollRequest:
      type: object
      required: [join_token, csr, node_name, agent_version, protocol_version]
      additionalProperties: false
      properties:
        join_token: { type: string, minLength: 1, maxLength: 200 }
        csr: { type: string, description: "PEM-encoded certificate signing request" }
        node_name: { type: string, minLength: 1, maxLength: 100 }
        agent_version: { type: string, maxLength: 50 }
        protocol_version: { type: integer }

    EnrollResponse:
      type: object
      required: [node_id, certificate, ca_certificate]
      additionalProperties: false
      properties:
        node_id: { type: string, format: uuid }
        certificate: { type: string, description: "PEM agent certificate" }
        ca_certificate: { type: string, description: "PEM CA certificate" }

    Node:
      type: object
      required: [id, name, status, agent_version, enrolled_at]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        status: { type: string, enum: [active, revoked] }
        agent_version: { type: string }
        enrolled_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }
        policy_degraded:
          type: boolean
          description: >-
            Zero Trust (enterprise): a single CONSERVATIVE health signal for the gateway's policy
            enforcement. degraded = (apply error) OR (an enforcing apply is currently failing) OR
            (enforcing AND the policy in force differs from what the control plane would push now).
            The field errs toward OVER-reporting (a false "degraded" is an annoyance; a false
            "healthy" is the silent-blackhole class) — except in the provider can't-determine window,
            where the gateway is guaranteed on its last-good fail-closed policy (never open, never
            blackholing from this cause). The differentiated breakdown (which kind of degraded) + badge
            UX is S7.4, reading the same agent-reported JSONB.
        policy_degraded_kind:
          type: string
          enum: [healthy, apply_failing, stuck_enforcing, converging, silent_desync, desync_unknown]
          description: >-
            Zero Trust (enterprise, S7.4b): the ADVISORY differentiated health kind — display detail
            over `policy_degraded`, which stays the sole authoritative signal (nothing keys logic on
            this). `desync_unknown` is a FIRST-CLASS honest state (compile-hash unavailable, or the
            gateway stopped reporting) — it means "cannot determine", NEVER healthy and NEVER a specific
            kind. `converging` is a normal push settling (< the report-cadence debounce) and must not
            alarm; `silent_desync` is a stuck pushed≠applied past the debounce with fresh reports.

    JoinTokenRequest:
      type: object
      additionalProperties: false
      properties:
        node_name: { type: string, maxLength: 100 }

    JoinTokenResponse:
      type: object
      required: [join_token]
      additionalProperties: false
      properties:
        join_token: { type: string }

    Device:
      type: object
      required: [id, user_id, node_id, name, status, public_key, created_at]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        node_id: { type: string, format: uuid }
        name: { type: string }
        platform: { type: string }
        public_key: { type: string }
        assigned_ip: { type: string }
        status: { type: string, enum: [active, revoked, pending] }
        approved_by:
          type: string
          format: uuid
          nullable: true
          description: "S7.3: who approved this device. null = grandfathered / auto-active (device_approval off). Set = explicitly approved."
        created_at: { type: string, format: date-time }
        # Live status (S3.6). last_handshake_at is the most recent WireGuard
        # handshake; `online` is DERIVED from its recency (WireGuard has no
        # connection state) — treat it as an approximation. rx/tx are raw byte
        # gauges that reset when the interface restarts (display only).
        last_handshake_at: { type: string, format: date-time }
        online: { type: boolean }
        rx_bytes: { type: integer, format: int64 }
        tx_bytes: { type: integer, format: int64 }

    CreateDeviceRequest:
      type: object
      required: [name, node_id]
      additionalProperties: false
      properties:
        name: { type: string, maxLength: 100 }
        node_id: { type: string, format: uuid }
        platform: { type: string, maxLength: 50 }
        # Omit public_key to have the server generate the keypair (browser flow):
        # the private key is then returned ONCE and never stored.
        public_key: { type: string }
        # Admins may create a device on behalf of another org member; omit for self.
        user_id: { type: string, format: uuid }
        # Route all traffic (0.0.0.0/0). Default false = split-tunnel (org network only).
        full_tunnel: { type: boolean }

    CreateDeviceResponse:
      type: object
      x-go-name: CreateDeviceResult
      required: [device]
      additionalProperties: false
      properties:
        device: { $ref: "#/components/schemas/Device" }
        # Present ONLY for the server-generated flow; shown once, never stored.
        private_key: { type: string }
        # The ready-to-use wg-quick .conf (server-generated flow only), shown once.
        config: { type: string }
        # S7.3: true when the org requires device approval — the device is enrolled but
        # BLOCKED (no tunnel) until an admin approves. The client shows a stable
        # "awaiting approval" state (never an error loop).
        pending_approval: { type: boolean }

    DeviceApproval:
      type: object
      required: [mode]
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [off, on]
          description: "S7.3 device posture. off = devices enroll active (default); on = new devices enroll PENDING until an admin approves."
        grandfathered_count:
          type: integer
          description: >
            On ENABLING (PUT off->on only), the count of existing active devices that stay
            active (grandfathered — a flip must not black-hole the fleet). Best-effort;
            absent when disabling.

    InviteRequest:
      type: object
      required: [email, role]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 320 }
        role: { type: string, enum: [owner, admin, member] }

    Member:
      type: object
      required: [user_id, email, name, role, status, email_verified, joined_at]
      additionalProperties: false
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        role: { type: string, enum: [owner, admin, member] }
        # Account status — a deactivated member stays on the roster (S2.6).
        status: { type: string, enum: [active, deactivated] }
        email_verified: { type: boolean }
        joined_at: { type: string, format: date-time }

    ChangeRoleRequest:
      type: object
      required: [role]
      additionalProperties: false
      properties:
        role: { type: string, enum: [owner, admin, member] }

    EmailRequest:
      type: object
      required: [email]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 320 }

    AcceptInviteRequest:
      type: object
      required: [token]
      additionalProperties: false
      properties:
        token: { type: string, minLength: 1, maxLength: 200 }
        name: { type: string, maxLength: 200 }
        password: { type: string, minLength: 12, maxLength: 200 }

    DomainClaimRequest:
      type: object
      required: [domain]
      additionalProperties: false
      properties:
        domain: { type: string, minLength: 3, maxLength: 253 }

    DomainClaimResponse:
      type: object
      required: [txt_record]
      additionalProperties: false
      properties:
        txt_record:
          type: string
          description: Publish this exact value as a TXT record on the domain, then verify.

    DomainVerifyRequest:
      type: object
      required: [domain]
      additionalProperties: false
      properties:
        domain: { type: string, minLength: 3, maxLength: 253 }

    SsoConfigRequest:
      type: object
      required: [client_id, client_secret, enabled]
      additionalProperties: false
      properties:
        client_id: { type: string, minLength: 1, maxLength: 500 }
        client_secret: { type: string, minLength: 1, maxLength: 500 }
        tenant_id:
          type: string
          maxLength: 200
          description: Required for Microsoft (the org's Entra tenant ID); unused by Google.
        enabled: { type: boolean }

    # Read projection of an SSO config. WRITE-ONLY SECRET: there is deliberately
    # NO client_secret field here — the secret is never returned. secret_fingerprint
    # is a keyed HMAC (safe to expose) that proves which secret is stored.
    SsoConfigView:
      type: object
      required: [provider, client_id, enabled, secret_fingerprint, updated_at]
      additionalProperties: false
      properties:
        provider: { type: string, enum: [google, microsoft] }
        client_id: { type: string }
        tenant_id: { type: string }
        enabled: { type: boolean }
        secret_fingerprint: { type: string }
        updated_at: { type: string, format: date-time }

    AuthUser:
      type: object
      required: [id, email, email_verified]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        email_verified: { type: boolean }

    ActivityEntry:
      type: object
      required: [action, created_at]
      additionalProperties: false
      properties:
        action: { type: string }
        target_type: { type: string }
        target_id: { type: string }
        actor_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    # A single audit event for the viewer. `id` + `created_at` form the keyset
    # cursor. `details` is the event metadata (secret-free by construction — the
    # write side never puts secret material in it).
    AuditLogEntry:
      type: object
      required: [id, action, created_at, details]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        actor_id: { type: string, format: uuid }
        action: { type: string }
        target_type: { type: string }
        target_id: { type: string }
        details: { type: object, additionalProperties: true }

    OrgOverview:
      type: object
      required: [members, devices, nodes, online, recent_activity]
      additionalProperties: false
      properties:
        members: { type: integer }
        devices: { type: integer }
        nodes: { type: integer }
        # Devices whose last handshake is within the recency window (S3.6 approx).
        online: { type: integer }
        recent_activity:
          type: array
          items: { $ref: "#/components/schemas/ActivityEntry" }

    Meta:
      type: object
      required: [edition, sso_providers]
      additionalProperties: false
      properties:
        edition: { type: string, enum: [open, enterprise] }
        # SSO providers this deployment can offer (empty in the open edition, so
        # the SPA hides SSO entirely rather than showing buttons that error).
        sso_providers:
          type: array
          items: { type: string, enum: [google, microsoft] }

    SignupRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, minLength: 12, maxLength: 200 }
        name: { type: string, maxLength: 200 }

    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, maxLength: 200 }

    TokenRequest:
      type: object
      required: [token]
      additionalProperties: false
      properties:
        token: { type: string, minLength: 1, maxLength: 200 }

    PasswordResetRequest:
      type: object
      required: [email]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 320 }

    PasswordResetConfirmRequest:
      type: object
      required: [token, password]
      additionalProperties: false
      properties:
        token: { type: string, minLength: 1, maxLength: 200 }
        password: { type: string, minLength: 12, maxLength: 200 }

    Error:
      type: object
      description: |
        Standard error envelope for every non-2xx response. Chosen over bare
        RFC 7807 so the correlation `request_id` is a first-class field the SPA
        and CLI can surface directly; `code` is stable for programmatic handling.
      required: [error]
      additionalProperties: false
      properties:
        error:
          type: object
          required: [code, message]
          additionalProperties: false
          properties:
            code:
              type: string
              description: Stable, machine-readable error code.
              example: not_found
            message:
              type: string
              description: Human-readable explanation.
            request_id:
              type: string
              description: Correlation ID; match against server logs.
            details:
              type: array
              description: Field-level problems (e.g. validation failures).
              items:
                $ref: "#/components/schemas/ErrorDetail"

    ErrorDetail:
      type: object
      required: [message]
      additionalProperties: false
      properties:
        field:
          type: string
          description: Dotted path to the offending field, when applicable.
        message:
          type: string
          description: What is wrong with this field.

  responses:
    Error:
      description: Error response.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
