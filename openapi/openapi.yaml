          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UserGroup" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/groups/{groupId}:
