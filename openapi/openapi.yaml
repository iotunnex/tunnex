          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PolicyRule" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/zero-trust-mode:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getZeroTrustMode
      summary: Get the org enforcement mode (enterprise)
      tags: [policy]
      responses:
        "200":
          description: Current mode.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ZeroTrustMode" }
        default: { $ref: "#/components/responses/Error" }
    put:
      operationId: setZeroTrustMode
      summary: Set the org enforcement mode — enabling turns on default-deny (enterprise)
      tags: [policy]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ZeroTrustMode" }
      responses:
        "200":
          description: Updated mode.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ZeroTrustMode" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/invitations/accept:
    post:
      operationId: acceptInvitation
      summary: Accept an invitation
      tags: [invitations]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AcceptInviteRequest" }
      responses:
        "200":
          description: Accepted; the account is a member.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/invitations:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: createInvitation
      summary: Invite a user to the organization
      tags: [invitations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InviteRequest" }
      responses:
        "202":
          description: Invitation created (accept token returned for the dashboard link).
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InviteCreated" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/invitations/resend:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: resendInvitation
      summary: Resend an invitation (new token, old invalidated)
      tags: [invitations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmailRequest" }
      responses:
        "202":
          description: Invitation re-sent.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/invitations/revoke:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: revokeInvitation
      summary: Revoke a pending invitation
      tags: [invitations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EmailRequest" }
      responses:
        "204":
          description: Revoked.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/members:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listMembers
      summary: List the organization's members (roster incl. deactivated)
      tags: [members]
      responses:
        "200":
          description: The members.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Member" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/members/{userId}/role:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: userId
        in: path
        required: true
        schema: { type: string, format: uuid }
    put:
      operationId: changeMemberRole
      summary: Change a member's role (RBAC-gated; refuses demoting the last owner)
      tags: [members]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChangeRoleRequest" }
      responses:
        "204":
          description: Role changed. (Client refetches the roster.)
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/members/{userId}/deactivate:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: userId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: deactivateMember
      summary: Deactivate a member's account (freezes access, revokes sessions)
      tags: [members]
      responses:
        "204":
          description: Deactivated.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/members/{userId}/reactivate:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: userId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: reactivateMember
      summary: Reactivate a deactivated member
      tags: [members]
      responses:
        "204":
          description: Reactivated.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/domains:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: createDomainClaim
      summary: Claim an email domain for capture (enterprise)
      tags: [sso]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DomainClaimRequest" }
      responses:
        "201":
          description: Claim created — publish the returned TXT record, then verify.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DomainClaimResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/domains/verify:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: verifyDomainClaim
      summary: Verify a claimed domain via its DNS TXT record (enterprise)
      tags: [sso]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DomainVerifyRequest" }
      responses:
        "200":
          description: Verified.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations:
    get:
      operationId: listOrganizations
      summary: List organizations
      description: Lists the organizations the authenticated user belongs to.
      tags: [organizations]
      responses:
        "200":
          description: Organizations.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organization"
        default:
          $ref: "#/components/responses/Error"
    post:
      operationId: createOrganization
      summary: Create an organization
      description: |
        Creates an organization. In the open edition this fails with
        `org_limit_reached` once one organization exists; the enterprise build
        allows multiple.
      tags: [organizations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: The created organization.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/organizations/{orgId}:
    parameters:
      - name: orgId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getOrganization
      summary: Get an organization
      tags: [organizations]
      responses:
        "200":
          description: The organization.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        default:
          $ref: "#/components/responses/Error"
    patch:
      operationId: updateOrganization
      summary: Update organization settings (name only; slug is immutable)
      tags: [organizations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationRequest"
      responses:
        "200":
          description: The updated organization.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"
        default:
          $ref: "#/components/responses/Error"
    delete:
      operationId: deleteOrganization
      summary: Soft-delete an organization
      tags: [organizations]
      responses:
        "204":
          description: Deleted.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/organizations/{orgId}/pool-cidr:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    put:
      # EDITION-NEUTRAL: the address allocator is core/open (S3.5), so resize has
      # no edition gate. Do not add one.
      operationId: resizePool
      summary: Resize the org's WireGuard address pool (grow-superset or shrink-subset)
      tags: [organizations]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PoolCidrRequest" }
      responses:
        "200":
          description: The updated organization (also returned unchanged for an idempotent no-op resize).
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Organization" }
        "409":
          description: The shrink would strand live allocations; none were changed.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ResizeConflict" }
        default:
          $ref: "#/components/responses/Error"

  # ── S8.1 site-to-site (EPIC 8): site model + subnet advertisement/approval (site:manage) ──
  /api/v1/organizations/{orgId}/sites:
    parameters:
      - { name: orgId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: listSites
      summary: List the org's sites (S8.1)
      tags: [sites]
      responses:
        "200":
          description: Sites.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Site" } } } }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: registerSite
      summary: Register a site gateway (S8.1; site:manage)
      tags: [sites]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RegisterSiteRequest" } } }
      responses:
        "201":
          description: Created.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content: { application/json: { schema: { $ref: "#/components/schemas/Site" } } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/routed-ranges:
    parameters:
      - { name: orgId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: listRoutedRanges
      summary: The org's declared routed LAN ranges for split-tunnel device AllowedIPs (S8.5). Ranges-ONLY (no keys/endpoints/pool/policy) — the never-re-fetch identity invariant survives. Approved-only, sorted + canonical. Empty is a first-class answer.
      tags: [sites]
      responses:
        "200":
          description: Routed ranges (approved site-subnet CIDRs; possibly empty).
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content: { application/json: { schema: { $ref: "#/components/schemas/RoutedRanges" } } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/routed-lans:
    parameters:
      - { name: orgId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      operationId: routeLAN
      summary: One-screen "route a LAN through this gateway" (S8.5 D1; site:manage). Composes register-site + bind-gateway + advertise-subnet + approve into one call — byte-identical DB state + the four constituent audit events. On a range collision the site+bind+pending-subnet persist and the typed refusal is returned.
      tags: [sites]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/RouteLANRequest" } } }
      responses:
        "201":
          description: The site whose gateway now routes the LAN.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content: { application/json: { schema: { $ref: "#/components/schemas/Site" } } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/sites/{siteId}:
    parameters:
      - { name: orgId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: siteId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: getSiteReferences
      summary: Count what references a site — cascade preview + reverse link (S8.3; site:manage)
      description: >-
        The rule/subnet counts the UI needs BEFORE a delete (D4 cascade preview: N rules deleted, M subnets
        released) and to render the site page's "rules referencing this site" reverse link (D1). ONE endpoint
        serves both. A rule is referenced if it names this site as src OR dst.
      tags: [sites]
      responses:
        "200":
          description: Reference counts.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content: { application/json: { schema: { $ref: "#/components/schemas/SiteReferences" } } }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: deleteSite
      summary: Delete a site — cascades its subnets + site-referencing rules (S8.3; site:manage)
      description: >-
        Deletes the site; ON DELETE CASCADE removes its subnets and any policy rule naming it as src/dst, and
        the bound gateway is unbound. The UI gates this behind a name-typed confirm + the getSiteReferences
        cascade preview (D4). Discharges the S8.1 DELIBERATELY-UNWIRED DeleteSite query.
      tags: [sites]
      responses:
        "204": { description: Deleted. }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/sites/{siteId}/subnets:
    parameters:
      - { name: orgId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: siteId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: listSiteSubnets
      summary: List a site's subnets (S8.1; site:manage)
      tags: [sites]
      responses:
        "200":
          description: The site's subnets.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/SiteSubnet" } } } }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: addSiteSubnet
      summary: Advertise a subnet on a site — pending approval (S8.1; site:manage)
      tags: [sites]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/AddSiteSubnetRequest" } } }
      responses:
        "201":
          description: Advertised (pending approval).
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content: { application/json: { schema: { $ref: "#/components/schemas/SiteSubnet" } } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/sites/{siteId}/dns-forwards:
    parameters:
      - { name: orgId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: siteId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: listSiteDNSForwards
      summary: List a site's cross-site DNS forwarding zones (S8.4; site:manage)
      tags: [sites]
      responses:
        "200":
          description: The site's forwarded zones.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/DNSForward" } } } }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: setSiteDNSForward
      summary: Add/update a forwarded zone (S8.4; site:manage)
      description: >-
        Forwards {domain} to {resolver_ip} — the resolver MUST be inside one of this site's approved subnets
        (409 dns_resolver_not_in_site_subnet otherwise), and the domain must not already be forwarded by
        ANOTHER site in the org (409 dns_domain_conflict — one zone → one resolver). Same domain on this site
        updates its resolver. Audited site.dns_forwarding_set.
      tags: [sites]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DNSForward" } } }
      responses:
        "204": { description: Set. }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/sites/{siteId}/dns-forwards/{domain}:
    parameters:
      - { name: orgId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: siteId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: domain, in: path, required: true, schema: { type: string } }
    delete:
      operationId: removeSiteDNSForward
      summary: Remove a forwarded zone — full-sweep withdraws it from all gateways (S8.4; site:manage)
      tags: [sites]
      responses:
        "204": { description: Removed. }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/sites/{siteId}/bind:
    parameters:
      - { name: orgId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: siteId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      operationId: bindSiteNode
      summary: Bind a gateway node to a site — single-node v1 (S8.1; site:manage)
      tags: [sites]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/BindSiteNodeRequest" } } }
      responses:
        "204": { description: Bound. }
        default: { $ref: "#/components/responses/Error" }
    delete:
      operationId: unbindSiteNode
      summary: Unbind a gateway node from the site — D6 replace-node (S8.1/S8.6 #3; site:manage)
      description: >
        Unbinds a gateway. With a node_id body, unbinds THAT gateway — post the single-node lift a site may
        hold several, so the caller names which (S8.6 #3). WITHOUT a body (the legacy caller shape, S8.6 #6
        compat), unbinds the site's SOLE gateway; a multi-gateway site then requires node_id (409). 404 when
        the node is not bound to this site / the site has no gateway.
      tags: [sites]
      requestBody:
        required: false
        content: { application/json: { schema: { $ref: "#/components/schemas/UnbindSiteNodeRequest" } } }
      responses:
        "204": { description: Unbound. }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/site-subnets/pending:
    parameters:
      - { name: orgId, in: path, required: true, schema: { type: string, format: uuid } }
    get:
      operationId: listPendingSiteSubnets
      summary: List advertised-but-unapproved subnets — the review queue (S8.1; site:manage)
      tags: [sites]
      responses:
        "200":
          description: Pending advertisements.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/SiteSubnet" } } } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/site-subnets/{subnetId}/approve:
    parameters:
      - { name: orgId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: subnetId, in: path, required: true, schema: { type: string, format: uuid } }
    post:
      operationId: approveSiteSubnet
      summary: Approve an advertised subnet after disjointness (S8.1; site:manage)
      tags: [sites]
      responses:
        "204": { description: Approved. }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/site-subnets/{subnetId}:
    parameters:
      - { name: orgId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: subnetId, in: path, required: true, schema: { type: string, format: uuid } }
    delete:
      operationId: removeSiteSubnet
      summary: Un-advertise / remove a site subnet (S8.2c WF-5; site:manage)
      description: >-
        Removes an advertised subnet from a site. A pending subnet just disappears; an APPROVED subnet's
        route is withdrawn from all gateways on the next reconcile (the full-sweep contract) — the UI states
        this consequence in the confirm. Correcting a mis-advertised subnet no longer requires deleting the
        whole site (the WF-5 trap the cross-cloud walk hit). Audited site.subnet_removed.
      tags: [sites]
      responses:
        "204": { description: Removed. }
        default: { $ref: "#/components/responses/Error" }

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: tunnex_session
    # CLI credential (tnx_...). bearer ≡ cookie on every authenticated endpoint;
    # the ONLY exceptions are argued on the ops themselves (cliAuthorize +
    # cliDeviceApprove — credential minting must not be reachable from a bearer).
    bearerAuth:
      type: http
      scheme: bearer

  headers:
    RequestId:
      description: Correlation ID for this request; also appears in server logs.
      schema:
        type: string
      required: true

  schemas:
    HealthResponse:
      type: object
      required: [status, service]
      additionalProperties: false
      properties:
        status:
          type: string
          enum: [ok]
          description: Liveness status.
        service:
          type: string
          description: Reporting service name.
          example: tunnex-api
        request_id:
          type: string
          description: Correlation ID for this request.

    Organization:
      type: object
      required: [id, name, slug, pool_cidr, created_at, updated_at]
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        pool_cidr:
          type: string
          description: The org's flat WireGuard address pool (IPv4 CIDR).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PoolCidrRequest:
      type: object
      required: [cidr]
      additionalProperties: false
      properties:
        cidr: { type: string, description: New pool CIDR (IPv4). Must contain or be contained by the current range. }

    # ── Zero Trust policy (S7.1, enterprise) ──────────────────────────────────
    UserGroup:
      type: object
      required: [id, org_id, name, description, created_at, updated_at]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        # origin distinguishes a hand-managed group from a directory-synced one (S7.5.2). A
        # manual group omits the idp_* fields; an idp_sync group carries both. Hand-editing an
        # idp_sync group's membership is refused (409) — the reconciler owns it.
        origin: { type: string, enum: [manual, idp_sync] }
        idp_provider: { type: string, enum: [microsoft, google] }
        idp_group_id: { type: string }

    IdpSyncConfigRequest:
      type: object
      required: [client_id, client_secret]
      additionalProperties: false
      properties:
        client_id: { type: string, minLength: 1 }
        client_secret: { type: string, minLength: 1, description: Sealed at rest (AES-GCM); never returned. }
        tenant_id: { type: string, description: Entra tenant id; omit for google. }
        enabled: { type: boolean, default: true }

    IdpSyncConfig:
      type: object
      required: [provider, client_id, enabled, last_sync_ok, sync_health]
      additionalProperties: false
      properties:
        provider: { type: string, enum: [microsoft, google] }
        client_id: { type: string }
        # Keyed 12-hex proof-of-secret (S4.5): the read path NEVER returns the client secret, only
        # this fingerprint — enough to confirm a secret is set / detect a change, useless to an attacker.
        secret_fingerprint: { type: string }
        tenant_id: { type: string }
        enabled: { type: boolean }
        last_sync_at: { type: string, format: date-time }
        last_sync_ok: { type: boolean }
        last_sync_error: { type: string }
        sync_health: { type: string, description: Two-tier derived health (D2). }

    IdpSyncHealth:
      type: object
      required: [provider, sync_health, last_sync_ok]
      additionalProperties: false
      properties:
        provider: { type: string, enum: [microsoft, google] }
        sync_health: { type: string }
        last_sync_ok: { type: boolean }
        last_sync_at: { type: string, format: date-time }
        last_sync_error: { type: string }

    IdpGroupMapRequest:
      type: object
      required: [idp_group_id]
      additionalProperties: false
      properties:
        idp_group_id: { type: string, minLength: 1, description: The external directory group id. }
        # Exactly one of name (create a new idp_sync group) or group_id (bind an EXISTING manual
        # group — refused unless it is empty). Providing neither creates a group named after the
        # idp_group_id; providing both is a 400.
        name: { type: string, minLength: 1, maxLength: 100 }
        group_id: { type: string, format: uuid }

    GroupRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, maxLength: 500 }

    GroupMember:
      type: object
      required: [user_id, email, name, added_at]
      additionalProperties: false
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string }
        name: { type: string }
        added_at: { type: string, format: date-time }

    AddGroupMemberRequest:
      type: object
      required: [user_id]
      additionalProperties: false
      properties:
        user_id: { type: string, format: uuid }

    Resource:
      type: object
      required: [id, org_id, name, cidr, protocol, created_at, updated_at]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        name: { type: string }
        cidr: { type: string, description: "Destination prefix (e.g. 10.0.5.0/24, 0.0.0.0/0)." }
        protocol: { type: string, enum: [any, tcp, udp] }
        port_low: { type: integer, nullable: true, minimum: 1, maximum: 65535 }
        port_high: { type: integer, nullable: true, minimum: 1, maximum: 65535 }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ResourceRequest:
      type: object
      required: [name, cidr, protocol]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1, maxLength: 100 }
        cidr: { type: string }
        protocol: { type: string, enum: [any, tcp, udp] }
        port_low: { type: integer, nullable: true, minimum: 1, maximum: 65535 }
        port_high: { type: integer, nullable: true, minimum: 1, maximum: 65535 }

    PolicyRule:
      type: object
      required: [id, org_id, src_kind, dst_kind, created_at, cidr_outside_org_ranges]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        # S7.5.4: the SOURCE subject is a group or a single user; S8.2: or a site's LAN; S8.7: or a literal CIDR (exactly one src_* set).
        src_kind: { type: string, enum: [group, user, site, cidr] }
        src_group_id: { type: string, format: uuid, nullable: true }
        src_user_id: { type: string, format: uuid, nullable: true }
        src_site_id: { type: string, format: uuid, nullable: true }
        src_cidr: { type: string, nullable: true, description: "Set when src_kind=cidr (S8.7): a literal source CIDR (/32-precise)." }
        # S8.7 warn-not-refuse: true when src_cidr is not inside any current org range (site subnet / routed range / device pool) — a rule matching nothing (a silent no-op wearing a rule's face). DERIVED at read time from CURRENT ranges, so it sheds once the range lands. false for non-cidr sources.
        cidr_outside_org_ranges: { type: boolean }
        dst_kind: { type: string, enum: [resource, group, site] }
        dst_resource_id: { type: string, format: uuid, nullable: true }
        dst_group_id: { type: string, format: uuid, nullable: true }
        dst_site_id: { type: string, format: uuid, nullable: true }
        # S7.5.4: null = permanent; set = a temporary grant that lapses at this instant.
        expires_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    CreatePolicyRuleRequest:
      type: object
      required: [dst_kind]
      additionalProperties: false
      properties:
        # src_kind defaults to "group" when omitted (back-compat). user => src_user_id; site => src_site_id (S8.2); cidr => src_cidr (S8.7).
        src_kind: { type: string, enum: [group, user, site, cidr] }
        src_group_id: { type: string, format: uuid, nullable: true, description: Required when src_kind=group (or omitted). }
        src_user_id: { type: string, format: uuid, nullable: true, description: Required when src_kind=user (a current org member). }
        src_site_id: { type: string, format: uuid, nullable: true, description: "Required when src_kind=site (S8.2); the compiler resolves it to the source site's approved subnet CIDRs (the LAN source)." }
        src_cidr: { type: string, nullable: true, description: "Required when src_kind=cidr (S8.7): a literal source CIDR, e.g. 172.31.17.64/32. Validated well-formed; org-range meaningfulness is a read-time warning, not a creation refusal (warn-not-refuse)." }
        dst_kind: { type: string, enum: [resource, group, site] }
        dst_resource_id: { type: string, format: uuid, nullable: true, description: Required when dst_kind=resource. }
        dst_group_id: { type: string, format: uuid, nullable: true, description: Required when dst_kind=group. }
        dst_site_id: { type: string, format: uuid, nullable: true, description: "Required when dst_kind=site (S8.1); the compiler resolves it to the site's approved subnet CIDRs." }
        expires_at: { type: string, format: date-time, nullable: true, description: "Set = a temporary grant that expires at this time (must be future); omit for a permanent grant." }

    # ── S8.1 site-to-site ──
    Site:
      type: object
      required: [id, name, link_transport, created_at]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        link_transport: { type: string, enum: [wireguard], description: "Reserved enum (D4); wireguard-only in v1." }
        link_mtu: { type: integer, nullable: true }
        created_at: { type: string, format: date-time }
    DNSForward:
      type: object
      required: [domain, resolver_ip]
      additionalProperties: false
      properties:
        domain: { type: string, description: "The forwarded zone (e.g. corp.local)." }
        resolver_ip: { type: string, description: "The site's internal resolver — must be inside one of the site's approved subnets (S8.4)." }

    RoutedRanges:
      type: object
      required: [ranges, forwards]
      additionalProperties: false
      properties:
        ranges:
          type: array
          items: { type: string }
          description: "Approved site-subnet CIDRs (canonical masked form, sorted) pushed to split-tunnel device AllowedIPs (S8.5). Ranges only — no identity material. Empty when none declared."
        forwards:
          type: array
          items: { $ref: "#/components/schemas/DNSForward" }
          description: "DNS forwards whose resolver is REACHABLE via the returned ranges (S8.5 Slice 3). GATED: a forward is included only if its resolver_ip falls inside a routed range — a resolver you can't reach is never handed over (no SERVFAIL generator). Empty when none reachable."

    RouteLANRequest:
      type: object
      required: [node_id, cidr]
      additionalProperties: false
      properties:
        node_id: { type: string, format: uuid, description: "The gateway node that fronts this LAN." }
        cidr: { type: string, description: "The LAN CIDR to route (IPv4). Validated disjoint from the org's other subnets + pool." }
        name: { type: string, description: "Optional site name; blank derives a default from the CIDR (S8.5 D1 solo-admin path)." }

    HubPriorityRequest:
      type: object
      additionalProperties: false
      properties:
        priority:
          type: integer
          nullable: true
          description: "The admin hub pin (S8.6 D1) — lower = more preferred; null CLEARS the pin. Pinning declares a gateway a hub candidate; the PINNED set IS the HA hub set (opt-in)."
    HubSet:
      type: object
      required: [generation, members]
      additionalProperties: false
      properties:
        generation:
          type: integer
          format: int64
          description: "The set's version tag (S8.6 D5) — bumps on every membership/order change (a promotion event)."
        members:
          type: array
          items: { $ref: "#/components/schemas/HubMember" }
          description: "The ORDERED active hub set: members[0] = the acting primary, the rest = standbys."
    HubMember:
      type: object
      required: [node_id, role]
      additionalProperties: false
      properties:
        node_id: { type: string, format: uuid }
        role: { type: string, enum: [primary, standby] }
        hub_priority:
          type: integer
          nullable: true
          description: "The admin pin (the CONFIGURED order) — so the UI can show a promotion 'in effect' when the active order diverges. Null = unpinned."
        metrics:
          allOf: [ { $ref: "#/components/schemas/HubMemberMetrics" } ]
          nullable: true
          description: "Latest node_peer_status observation, or ABSENT when this member is not reporting (distinct from an idle link with zero bytes)."
    HubMemberMetrics:
      type: object
      required: [last_handshake_at, rx_bytes, tx_bytes]
      additionalProperties: false
      properties:
        last_handshake_at: { type: string, format: date-time }
        rx_bytes: { type: integer, format: int64, description: "Raw gauge since the last handshake (display only, never summed as monotonic)." }
        tx_bytes: { type: integer, format: int64 }

    SiteSubnet:
      type: object
      required: [id, site_id, cidr, status]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        site_id: { type: string, format: uuid }
        cidr: { type: string, description: "IPv4 CIDR of the routed LAN (e.g. 10.20.0.0/24)." }
        status: { type: string, enum: [pending, approved], description: "Advertised subnets are pending until approved (D5)." }
    SiteReferences:
      type: object
      required: [rule_count, subnet_count]
      additionalProperties: false
      properties:
        rule_count: { type: integer, description: "Policy rules naming this site as src or dst (deleted on cascade)." }
        subnet_count: { type: integer, description: "Subnets advertised on this site (released on cascade)." }
      description: "S8.3 D1/D4: what references a site — the delete cascade preview + the reverse-link count."
    RegisterSiteRequest:
      type: object
      required: [name]
      additionalProperties: false
      properties:
        name: { type: string, maxLength: 100 }
    AddSiteSubnetRequest:
      type: object
      required: [cidr]
      additionalProperties: false
      properties:
        cidr: { type: string, description: "IPv4 CIDR to advertise (e.g. 10.20.0.0/24)." }
    BindSiteNodeRequest:
      type: object
      required: [node_id]
      additionalProperties: false
      properties:
        node_id: { type: string, format: uuid }
    UnbindSiteNodeRequest:
      # S8.6 #6: node_id is OPTIONAL on unbind — with it, unbind THAT gateway (#3 explicit-id);
      # without it (the legacy bodyless caller, shimmed to {} at the router), unbind the site's
      # sole gateway. A separate schema from Bind, whose node_id is required.
      type: object
      additionalProperties: false
      properties:
        node_id: { type: string, format: uuid }

    ExtendGrantRequest:
      type: object
      required: [expires_at]
      additionalProperties: false
      properties:
        expires_at: { type: string, format: date-time, description: "The grant's new expiry (must be in the future)." }

    ZeroTrustMode:
      type: object
      required: [mode]
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [off, enforcing]
          description: "off = legacy blanket mesh; enforcing = default-deny + compiled allows."
        affected_full_tunnel_devices:
          type: array
          description: >
            On ENABLING enforcing (PUT only), the full-tunnel devices whose internet egress
            becomes policy-governed by the flip — the blast radius for the warn-and-confirm.
            The server obeys regardless; this is the honest count + names. Absent/empty when
            disabling or when none are affected. State name for these = egress_policy_denied
            (distinct from gateway_no_egress: the gateway CAN egress, policy is denying it).
          items: { $ref: "#/components/schemas/AffectedDevice" }

    AffectedDevice:
      type: object
      required: [id, name]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        name: { type: string }

    # One stranded allocation. reason distinguishes out_of_range (visibly outside
    # the new range) from reserved_collision (numerically INSIDE it but on the new
    # network/gateway/broadcast — looks fine to the eye, still stranded).
    Orphan:
      type: object
      required: [device_id, name, assigned_ip, reason]
      additionalProperties: false
      properties:
        device_id: { type: string, format: uuid }
        name: { type: string }
        assigned_ip: { type: string }
        reason: { type: string, enum: [out_of_range, reserved_collision] }

    # 409 body when a resize would strand live allocations. orphan_count is the
    # true total; orphans is capped (the caller renders the list, the count is honest).
    ResizeConflict:
      type: object
      required: [orphan_count, orphans]
      additionalProperties: false
      properties:
        orphan_count: { type: integer }
        orphans:
          type: array
          items: { $ref: "#/components/schemas/Orphan" }

    CreateOrganizationRequest:
      type: object
      required: [name, slug]
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        slug:
          type: string
          minLength: 1
          maxLength: 63
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"

    UpdateOrganizationRequest:
      type: object
      required: [name]
      additionalProperties: false
      description: Only the name is mutable; the slug is fixed at creation.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200

    # ---- CLI credential flow (S5.1) ----------------------------------------
    CliAuthorizeRequest:
      type: object
      required: [redirect_uri, code_challenge, state]
      additionalProperties: false
      properties:
        redirect_uri:
          type: string
          maxLength: 200
          description: >
            Loopback only — http://127.0.0.1:<port>/callback or
            http://[::1]:<port>/callback (any port, exactly that path; hostnames
            incl. "localhost" are refused — DNS-spoofable).
        code_challenge:
          type: string
          minLength: 43
          maxLength: 128
          description: PKCE S256 challenge (base64url SHA-256 of the CLI's verifier).
        state:
          type: string
          minLength: 1
          maxLength: 200
          description: Echoed to the loopback callback verbatim (CLI-side correlation/CSRF).

    CliAuthorizeResponse:
      type: object
      x-go-name: CliAuthorizeResult
      required: [code, state, expires_in]
      additionalProperties: false
      properties:
        code: { type: string, description: "One-time authorization code (single-use, hashed at rest)." }
        state: { type: string }
        expires_in: { type: integer, description: "Code lifetime in seconds (60)." }

    CliTokenRequest:
      type: object
      required: [code, code_verifier, redirect_uri]
      additionalProperties: false
      properties:
        code: { type: string, minLength: 1, maxLength: 200 }
        code_verifier: { type: string, minLength: 43, maxLength: 128 }
        redirect_uri:
          type: string
          maxLength: 200
          description: Must EXACTLY match the redirect the code was bound to at mint.

    # WRITE-ONCE SECRET: the token appears ONLY here, never in any GET/list
    # response type (structural absence — the proof-of-secret convention).
    # x-go-name avoids colliding with oapi-codegen's generated CliTokenResponse
    # operation wrapper (Go naming only; the wire contract is unchanged).
    CliTokenResponse:
      type: object
      x-go-name: CliCredentialGrant
      required: [token, expires_at, fingerprint]
      additionalProperties: false
      properties:
        token:
          type: string
          description: >
            The dedicated CLI bearer credential, prefixed tnx_ (secret-scanner
            matchable). Shown exactly once; stored hashed; send as
            "Authorization: Bearer <token>".
        expires_at: { type: string, format: date-time, description: "Absolute expiry (90 days)." }
        fingerprint: { type: string, description: "Keyed 12-hex proof-of-secret; matches audit rows." }

    CliCredential:
      type: object
      required: [id, name, fingerprint, created_at, expires_at]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        name: { type: string, description: "Client-supplied label (e.g. hostname) or a default." }
        fingerprint: { type: string }
        created_at: { type: string, format: date-time }
        last_used_at: { type: string, format: date-time }
        expires_at: { type: string, format: date-time }

    CliDeviceStartResponse:
      type: object
      x-go-name: CliDeviceStartResult
      required: [device_code, user_code, verification_uri, interval, expires_in]
      additionalProperties: false
      properties:
        device_code: { type: string, description: "Poll credential; never shown to the user." }
        user_code: { type: string, description: "Short human code entered in the browser." }
        verification_uri: { type: string }
        interval: { type: integer, description: "Minimum poll interval in seconds." }
        expires_in: { type: integer }

    CliDeviceApproveRequest:
      type: object
      required: [user_code]
      additionalProperties: false
      properties:
        user_code: { type: string, minLength: 1, maxLength: 32 }

    CliDeviceTokenRequest:
      type: object
      required: [device_code]
      additionalProperties: false
      properties:
        device_code: { type: string, minLength: 1, maxLength: 200 }

    GenericMessage:
      type: object
      required: [message]
      additionalProperties: false
      properties:
        message: { type: string }

    InviteCreated:
      type: object
      required: [message, invite_token]
      additionalProperties: false
      properties:
        message: { type: string }
        invite_token:
          type: string
          description: >-
            Raw one-time accept token. The dashboard builds the accept link
            (origin + /accept-invite?token=…) for the admin to hand to the invitee
            — the SMTP-less delivery path. Also emailed when SMTP is configured.
            Shown once; not retrievable later.

    SsoRedirect:
      type: object
      required: [redirect_url]
      additionalProperties: false
      properties:
        redirect_url: { type: string }

    EnrollRequest:
      type: object
      required: [join_token, csr, node_name, agent_version, protocol_version]
      additionalProperties: false
      properties:
        join_token: { type: string, minLength: 1, maxLength: 200 }
        csr: { type: string, description: "PEM-encoded certificate signing request" }
        node_name: { type: string, minLength: 1, maxLength: 100 }
        agent_version: { type: string, maxLength: 50 }
        protocol_version: { type: integer }

    EnrollResponse:
      type: object
      required: [node_id, certificate, ca_certificate]
      additionalProperties: false
      properties:
        node_id: { type: string, format: uuid }
        certificate: { type: string, description: "PEM agent certificate" }
        ca_certificate: { type: string, description: "PEM CA certificate" }

    Node:
      type: object
      required: [id, name, status, agent_version, enrolled_at]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        status: { type: string, enum: [active, revoked] }
        agent_version: { type: string }
        enrolled_at: { type: string, format: date-time }
        last_seen_at: { type: string, format: date-time }
        policy_degraded:
          type: boolean
          description: >-
            Zero Trust (enterprise): a single CONSERVATIVE health signal for the gateway's policy
            enforcement. degraded = (apply error) OR (an enforcing apply is currently failing) OR
            (enforcing AND the policy in force differs from what the control plane would push now).
            The field errs toward OVER-reporting (a false "degraded" is an annoyance; a false
            "healthy" is the silent-blackhole class) — except in the provider can't-determine window,
            where the gateway is guaranteed on its last-good fail-closed policy (never open, never
            blackholing from this cause). The differentiated breakdown (which kind of degraded) + badge
            UX is S7.4, reading the same agent-reported JSONB.
        site_id:
          type: string
          format: uuid
          nullable: true
          description: >-
            S8.3 (D2/CH): the site this gateway is bound to (null = not a site gateway). The topology view
            joins nodes to sites by this field — a site's gateways are the nodes with this site_id, rendered
            as a LIST (many nodes → one site scales to future HA; the UI never assumes one-gateway-per-site).
        max_policy_version:
          type: integer
          nullable: true
          description: >-
            S8.3 (CW): the agent's REPORTED max-supported policy version — observability (a reported fact,
            OUTSIDE the compile hash; no ProtocolVersion bump). NULL = never reported (a pre-upgrade agent):
            absence reads as BELOW the current ceiling, never unknown-treated-as-ready (S7.5.3 absence-is-
            not-compliance, applied to version readiness). The UI's cross-site upgrade warning names the
            gateways whose max is below the ceiling.
        is_site_hub:
          type: boolean
          description: >-
            S8.3 (D2): true iff this gateway is the org's transit HUB — a PROJECTION of the ONE hub election
            (`electSiteHub`, the endpoint-bearing gateway with the lowest id; single hub v1). Backend-derived
            so the UI never re-elects the hub in TS. Absent/false for non-gateway nodes and NAT-only meshes.
        policy_degraded_kind:
          type: string
          enum: [healthy, apply_failing, stuck_enforcing, converging, silent_desync, desync_unknown, unsupported_policy_version, site_hub_down, site_link_down, site_subnet_unreachable]
          description: >-
            Zero Trust (enterprise, S7.4b): the ADVISORY differentiated health kind — display detail
            over `policy_degraded`, which stays the sole authoritative signal (nothing keys logic on
            this). `desync_unknown` is a FIRST-CLASS honest state (compile-hash unavailable, or the
            gateway stopped reporting) — it means "cannot determine", NEVER healthy and NEVER a specific
            kind. `converging` is a normal push settling (< the report-cadence debounce) and must not
            alarm; `silent_desync` is a stuck pushed≠applied past the debounce with fresh reports.
            `unsupported_policy_version` (S8.1 D1): the agent REFUSED the compiled artifact (its Version
            exceeds what the agent can apply) and went deny-all — the ONE kind whose remedy is
            edition-independent and operator-side: upgrade the agent. Set for any edition (the version
            gate lives on the agent, not the policy engine).
            `site_hub_down` / `site_link_down` (S8.2 H5/B2): a SITE gateway's site-to-site link has no fresh
            handshake — the hub is unreachable (`site_hub_down`, CP-derived: no public-endpoint carrier) or a
            spoke link is dead (`site_link_down`, agent-reported staleness). A down site bridge is never
            green. Hub outranks a single spoke link-down.
            `site_subnet_unreachable` (S8.2c D3): the gateway advertises a local site subnet but NO host
            address is inside it (bridge-trapped wg0 / misconfig) — agent-reported and INDEPENDENT of link
            state, so it catches the reassuring-green shape where the link handshake is fresh yet forwarded
            traffic can't be sourced onto the LAN. Ranks below the link-down kinds (a dead link masks it).

    JoinTokenRequest:
      type: object
      additionalProperties: false
      properties:
        node_name: { type: string, maxLength: 100 }

    JoinTokenResponse:
      type: object
      required: [join_token]
      additionalProperties: false
      properties:
        join_token: { type: string }

    Device:
      type: object
      required: [id, user_id, node_id, name, status, public_key, created_at]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        node_id: { type: string, format: uuid }
        name: { type: string }
        platform: { type: string }
        public_key: { type: string }
        assigned_ip: { type: string }
        status: { type: string, enum: [active, revoked, pending] }
        approved_by:
          type: string
          format: uuid
          nullable: true
          description: "S7.3: who approved this device. null = grandfathered / auto-active (device_approval off). Set = explicitly approved."
        created_at: { type: string, format: date-time }
        # Live status (S3.6). last_handshake_at is the most recent WireGuard
        # handshake; `online` is DERIVED from its recency (WireGuard has no
        # connection state) — treat it as an approximation. rx/tx are raw byte
        # gauges that reset when the interface restarts (display only).
        last_handshake_at: { type: string, format: date-time }
        online: { type: boolean }
        rx_bytes: { type: integer, format: int64 }
        tx_bytes: { type: integer, format: int64 }
        # Device health / posture (S7.5.3). Present ONLY when the org has >= 1
        # posture check configured (enterprise) — otherwise omitted, so an org
        # that never opted in sees no posture noise. health_state 'unknown' =
        # no report, stale report, or the fact was reported absent: ABSENCE IS
        # NOT COMPLIANCE — never render unknown as a pass. health_blocked is the
        # enforcement fact (the device is excluded from every gateway while true).
        health_state: { type: string, enum: [compliant, noncompliant, unknown] }
        health_blocked: { type: boolean }
        health_os_version: { type: string }
        # Tri-state: true/false = the client's reported fact; absent = not reported.
        health_disk_encrypted: { type: boolean }
        health_reported_at: { type: string, format: date-time }
        health_failed_checks:
          type: array
          items:
            type: object
            required: [kind, mode]
            additionalProperties: false
            properties:
              kind: { type: string, enum: [os_version, disk_encryption] }
              mode: { type: string, enum: [warn, require] }

    CreateDeviceRequest:
      type: object
      required: [name, node_id]
      additionalProperties: false
      properties:
        name: { type: string, maxLength: 100 }
        node_id: { type: string, format: uuid }
        platform: { type: string, maxLength: 50 }
        # Omit public_key to have the server generate the keypair (browser flow):
        # the private key is then returned ONCE and never stored.
        public_key: { type: string }
        # Admins may create a device on behalf of another org member; omit for self.
        user_id: { type: string, format: uuid }
        # Route all traffic (0.0.0.0/0). Default false = split-tunnel (org network only).
        full_tunnel: { type: boolean }

    CreateDeviceResponse:
      type: object
      x-go-name: CreateDeviceResult
      required: [device]
      additionalProperties: false
      properties:
        device: { $ref: "#/components/schemas/Device" }
        # Present ONLY for the server-generated flow; shown once, never stored.
        private_key: { type: string }
        # The ready-to-use wg-quick .conf (server-generated flow only), shown once.
        config: { type: string }
        # S7.3: true when the org requires device approval — the device is enrolled but
        # BLOCKED (no tunnel) until an admin approves. The client shows a stable
        # "awaiting approval" state (never an error loop).
        pending_approval: { type: boolean }

    DeviceApproval:
      type: object
      required: [mode]
      additionalProperties: false
      properties:
        mode:
          type: string
          enum: [off, on]
          description: "S7.3 device posture. off = devices enroll active (default); on = new devices enroll PENDING until an admin approves."
        grandfathered_count:
          type: integer
          description: >
            On ENABLING (PUT off->on only), the count of existing active devices that stay
            active (grandfathered — a flip must not black-hole the fleet). Best-effort;
            absent when disabling.

    HealthCheck:
      type: object
      required: [kind, mode]
      additionalProperties: false
      properties:
        kind:
          type: string
          enum: [os_version, disk_encryption]
          description: "S7.5.3 posture check kind (v1: os_version, disk_encryption; EDR is S7.5.3b)."
        mode:
          type: string
          enum: [warn, require]
          description: >
            warn = surface + audit only, never gates. require = a fresh non-compliant
            report excludes the device from every gateway within seconds.
        param:
          type: object
          nullable: true
          description: >
            Check parameters. os_version: {"min":{"macos":"14.0","windows":"10.0"}} —
            a platform absent from "min" is not enforced. disk_encryption: none.
        would_fail_count:
          type: integer
          description: >
            On PUT only: how many devices' LAST report would fail this check
            (best-effort blast radius). The config write itself blocks nothing —
            a device's gate only ever flips on its own next report (D4 grandfather).

    HealthCheckInput:
      type: object
      required: [mode]
      additionalProperties: false
      properties:
        mode: { type: string, enum: [warn, require] }
        param: { type: object, nullable: true }

    DeviceHealthReport:
      type: object
      required: [platform, os_version]
      additionalProperties: false
      description: >
        Client-reported posture facts (S7.5.3). NOT attestation — a compromised
        device can misreport; posture checks deter honest non-compliance and give
        an audit trail (defense-in-depth, not a guarantee).
      properties:
        platform: { type: string, enum: [macos, windows, linux, other] }
        os_version: { type: string, maxLength: 100 }
        # Omit when the client could NOT determine the fact (e.g. the FileVault
        # query failed): reported ABSENT, never guessed. An absent fact never
        # blocks (taxonomy class 2) — the check is skipped, surfaced as unknown.
        disk_encrypted: { type: boolean }
        # Client-claimed collection time (informational); the server clock decides staleness.
        collected_at: { type: string, format: date-time }

    DeviceHealthResult:
      type: object
      required: [state, blocked, failed_checks]
      additionalProperties: false
      properties:
        state: { type: string, enum: [compliant, noncompliant] }
        # True while a require-mode check fails: the device is excluded from desired
        # state (tunnel drops within seconds) until a later compliant report.
        blocked: { type: boolean }
        failed_checks:
          type: array
          items:
            type: object
            required: [kind, mode]
            additionalProperties: false
            properties:
              kind: { type: string, enum: [os_version, disk_encryption] }
              mode: { type: string, enum: [warn, require] }

    InviteRequest:
      type: object
      required: [email, role]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 320 }
        role: { type: string, enum: [owner, admin, member] }

    Member:
      type: object
      required: [user_id, email, name, role, status, email_verified, joined_at]
      additionalProperties: false
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        role: { type: string, enum: [owner, admin, member] }
        # Account status — a deactivated member stays on the roster (S2.6).
        status: { type: string, enum: [active, deactivated] }
        email_verified: { type: boolean }
        joined_at: { type: string, format: date-time }

    ChangeRoleRequest:
      type: object
      required: [role]
      additionalProperties: false
      properties:
        role: { type: string, enum: [owner, admin, member] }

    EmailRequest:
      type: object
      required: [email]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 320 }

    AcceptInviteRequest:
      type: object
      required: [token]
      additionalProperties: false
      properties:
        token: { type: string, minLength: 1, maxLength: 200 }
        name: { type: string, maxLength: 200 }
        password: { type: string, minLength: 12, maxLength: 200 }

    DomainClaimRequest:
      type: object
      required: [domain]
      additionalProperties: false
      properties:
        domain: { type: string, minLength: 3, maxLength: 253 }

    DomainClaimResponse:
      type: object
      required: [txt_record]
      additionalProperties: false
      properties:
        txt_record:
          type: string
          description: Publish this exact value as a TXT record on the domain, then verify.

    DomainVerifyRequest:
      type: object
      required: [domain]
      additionalProperties: false
      properties:
        domain: { type: string, minLength: 3, maxLength: 253 }

    SsoConfigRequest:
      type: object
      required: [client_id, client_secret, enabled]
      additionalProperties: false
      properties:
        client_id: { type: string, minLength: 1, maxLength: 500 }
        client_secret: { type: string, minLength: 1, maxLength: 500 }
        tenant_id:
          type: string
          maxLength: 200
          description: Required for Microsoft (the org's Entra tenant ID); unused by Google.
        enabled: { type: boolean }

    # Read projection of an SSO config. WRITE-ONLY SECRET: there is deliberately
    # NO client_secret field here — the secret is never returned. secret_fingerprint
    # is a keyed HMAC (safe to expose) that proves which secret is stored.
    SsoConfigView:
      type: object
      required: [provider, client_id, enabled, secret_fingerprint, updated_at]
      additionalProperties: false
      properties:
        provider: { type: string, enum: [google, microsoft] }
        client_id: { type: string }
        tenant_id: { type: string }
        enabled: { type: boolean }
        secret_fingerprint: { type: string }
        updated_at: { type: string, format: date-time }

    AuthUser:
      type: object
      required: [id, email, email_verified]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        email_verified: { type: boolean }
        # S7.5.5: true when the org enforces MFA and the user has no confirmed TOTP — the session is
        # gated to enrollment (D8). The client routes to the enrollment ceremony.
        mfa_enrollment_required: { type: boolean }
        # S7.5.5 D11: the user's UNUSED recovery-code count — CARDINALITY ONLY, never the codes
        # (nothing recoverable). Drives the low-remaining (<=3) + last-code warnings; returned on
        # /auth/me and on mfa/verify (the verify moment is exactly when a just-burned code matters).
        recovery_codes_remaining: { type: integer }

    LoginResult:
      type: object
      required: [mfa_required]
      additionalProperties: false
      properties:
        mfa_required: { type: boolean, description: "true = complete the second step at /auth/mfa/verify (no session set)." }
        user: { $ref: "#/components/schemas/AuthUser" }
        challenge: { type: string, description: "Login MFA challenge token (present iff mfa_required)." }
        challenge_expires_in: { type: integer, description: "Challenge TTL in seconds." }
        enrollment_required: { type: boolean, description: "S7.5.5: session minted but gated — the org enforces MFA and the user must enroll before proceeding (D8)." }

    MfaEnforce:
      type: object
      required: [enforce]
      additionalProperties: false
      properties:
        enforce: { type: boolean }

    MfaEnrollResult:
      type: object
      required: [otpauth_uri, secret]
      additionalProperties: false
      properties:
        otpauth_uri: { type: string, description: "otpauth:// URI for the QR code." }
        secret: { type: string, description: "Base32 manual-entry key (shown once)." }

    MfaCodeRequest:
      type: object
      required: [code]
      additionalProperties: false
      properties:
        code: { type: string, minLength: 1, maxLength: 20 }

    MfaVerifyRequest:
      type: object
      required: [challenge, code]
      additionalProperties: false
      properties:
        challenge: { type: string, minLength: 1, maxLength: 200 }
        code: { type: string, minLength: 1, maxLength: 20 }

    MfaRecoveryCodes:
      type: object
      required: [recovery_codes]
      additionalProperties: false
      properties:
        recovery_codes: { type: array, items: { type: string }, description: "Single-use recovery codes, shown ONCE." }

    ActivityEntry:
      type: object
      required: [action, created_at]
      additionalProperties: false
      properties:
        action: { type: string }
        target_type: { type: string }
        target_id: { type: string }
        actor_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }

    # A single audit event for the viewer. `id` + `created_at` form the keyset
    # cursor. `details` is the event metadata (secret-free by construction — the
    # write side never puts secret material in it).
    AuditLogEntry:
      type: object
      required: [id, action, created_at, details]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        actor_id: { type: string, format: uuid }
        # actor_system NAMES a non-human initiator (e.g. "idp-sync") when actor_id is absent —
        # a first-class, legible actor for compliance attribution (S7.5.2).
        actor_system: { type: string }
        action: { type: string }
        target_type: { type: string }
        target_id: { type: string }
        details: { type: object, additionalProperties: true }

    AccessEvent:
      type: object
      required: [id, created_at, seq, occurred_at, decision, src_ip, dst_ip, protocol]
      additionalProperties: false
      properties:
        id: { type: string, format: uuid }
        # created_at (ingest time) + id are the KEYSET CURSOR — pass the last entry's pair
        # as cursor_ts + cursor_id for the next page.
        created_at: { type: string, format: date-time }
        seq: { type: integer, format: int64, description: Per-org monotonic sequence (tamper-evidence / gap detection). }
        occurred_at: { type: string, format: date-time, description: Agent-clock flow observation time (NOT the pagination clock). }
        decision: { type: string, enum: [allow, deny, deny_aggregate, terminated, gap] }
        # GRANT-level attribution (rule_id -> resource/group). device/user are DEFERRED
        # (nil) — never derived from a racy src_ip lookup.
        rule_id: { type: string, format: uuid }
        node_id: { type: string, format: uuid }
        src_ip: { type: string }
        dst_ip: { type: string }
        dst_resource_id: { type: string, format: uuid }
        dst_group_id: { type: string, format: uuid }
        protocol: { type: string }
        dst_port: { type: integer }
        deny_count: { type: integer, description: ">1 for a per-source deny aggregate (port-scan collapse); N for a gap marker." }
        window_end: { type: string, format: date-time, description: deny_aggregate window end. }

    AccessLogHealth:
      type: object
      required: [retention_dropped, retention_failed]
      additionalProperties: false
      properties:
        retention_last_sweep: { type: string, format: date-time }
        retention_dropped: { type: integer, format: int64, description: Rows deleted by the last retention sweep (age + cap). }
        retention_failed: { type: boolean, description: The last retention sweep errored (partial/failed) — the PG hot-window may be growing. }

    OrgOverview:
      type: object
      required: [members, devices, nodes, online, recent_activity]
      additionalProperties: false
      properties:
        members: { type: integer }
        devices: { type: integer }
        nodes: { type: integer }
        # Devices whose last handshake is within the recency window (S3.6 approx).
        online: { type: integer }
        recent_activity:
          type: array
          items: { $ref: "#/components/schemas/ActivityEntry" }

    Meta:
      type: object
      required: [edition, sso_providers, protocol_version]
      additionalProperties: false
      properties:
        edition: { type: string, enum: [open, enterprise] }
        public_base_url:
          type: string
          description: >-
            S8.2c: the control plane's own CONFIGURED public base URL (APP_BASE_URL / install.sh's public
            address) — the AUTHORITATIVE answer to "where do gateways reach me", independent of how an admin
            happened to open the dashboard (a tunnel/alias/bare IP would bake the wrong URL into the emitted
            gateway install command). The gateway-enroll command derives TUNNEX_API_URL/TUNNEX_AGENT_URL from
            this, never from window.location. Empty when unset (the SPA then falls back to its own origin).
        node_agent_image:
          type: string
          description: >-
            S8.2c WF-2: the gateway agent image the emitted enroll command uses (TUNNEX_NODE_AGENT_IMAGE).
            One-truth applied to the artifact version — pin it to a DIGEST and the stale-`:latest` drift that
            mis-convicted D2 becomes structurally impossible. The SPA falls back to its own default ref when unset.
        protocol_version:
          type: integer
          description: >-
            S8.3 (CW): the control plane's current compiled-artifact version CEILING (policyspec.ProtocolVersion).
            The cross-site upgrade warning names gateways whose reported max is below this — server-sourced so
            the UI never hardcodes the ceiling (it bumps with each protocol change; a hardcoded copy would
            silently fork on the next bump).
        # SSO providers this deployment can offer (empty in the open edition, so
        # the SPA hides SSO entirely rather than showing buttons that error).
        sso_providers:
          type: array
          items: { type: string, enum: [google, microsoft] }

    SignupRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, minLength: 12, maxLength: 200 }
        name: { type: string, maxLength: 200 }

    LoginRequest:
      type: object
      required: [email, password]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, maxLength: 200 }

    TokenRequest:
      type: object
      required: [token]
      additionalProperties: false
      properties:
        token: { type: string, minLength: 1, maxLength: 200 }

    PasswordResetRequest:
      type: object
      required: [email]
      additionalProperties: false
      properties:
        email: { type: string, format: email, maxLength: 320 }

    PasswordResetConfirmRequest:
      type: object
      required: [token, password]
      additionalProperties: false
      properties:
        token: { type: string, minLength: 1, maxLength: 200 }
        password: { type: string, minLength: 12, maxLength: 200 }

    Error:
      type: object
      description: |
        Standard error envelope for every non-2xx response. Chosen over bare
        RFC 7807 so the correlation `request_id` is a first-class field the SPA
        and CLI can surface directly; `code` is stable for programmatic handling.
      required: [error]
      additionalProperties: false
      properties:
        error:
          type: object
          required: [code, message]
          additionalProperties: false
          properties:
            code:
              type: string
              description: Stable, machine-readable error code.
              example: not_found
            message:
              type: string
              description: Human-readable explanation.
            request_id:
              type: string
              description: Correlation ID; match against server logs.
            details:
              type: array
              description: Field-level problems (e.g. validation failures).
              items:
                $ref: "#/components/schemas/ErrorDetail"

    ErrorDetail:
      type: object
      required: [message]
      additionalProperties: false
      properties:
        field:
          type: string
          description: Dotted path to the offending field, when applicable.
        message:
          type: string
          description: What is wrong with this field.

  responses:
    Error:
      description: Error response.
      headers:
        X-Request-Id:
          $ref: "#/components/headers/RequestId"
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
