        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createGroup
      summary: Create a user-group (enterprise)
      tags: [policy]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GroupRequest" }
      responses:
        "201":
