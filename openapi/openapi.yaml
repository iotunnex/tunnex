openapi: 3.0.3
info:
  title: Tunnex API
  version: 0.1.0
  description: |
    Control-plane API for Tunnex.io. This spec is the single source of truth:
    the Go server types/handlers and the TypeScript client are generated from it
    (`make generate`), and drift fails the build (`make generate-check`).
servers:
  - url: /
    description: Same-origin (served behind the edge nginx)

# Endpoints require a session cookie OR a CLI bearer credential by default
# (bearer ≡ cookie, S5.1); public ones set `security: []`; cookie-only ops
# (credential minting) override with `security: [{cookieAuth: []}]` + argument.
security:
  - cookieAuth: []
  - bearerAuth: []

paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness probe
      description: Reports process liveness. No external dependencies are checked.
      tags: [system]
      security: []
      responses:
        "200":
          description: The service is alive.
          headers:
            X-Request-Id:
              $ref: "#/components/headers/RequestId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        default:
          $ref: "#/components/responses/Error"

  /api/v1/auth/signup:
    post:
      operationId: signup
      summary: Create a local account (sends a verification email)
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SignupRequest" }
      responses:
        "202":
          description: Accepted. Returns the same generic result whether or not the email was already registered.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/login:
    post:
      operationId: login
      summary: Verify credentials
      description: "S2.1 verifies credentials; S2.2 establishes the session cookie."
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: Credentials valid.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthUser" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/verify-email:
    post:
      operationId: verifyEmail
      summary: Verify an email address with a token
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TokenRequest" }
      responses:
        "200":
          description: Verified.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/password-reset:
    post:
      operationId: requestPasswordReset
      summary: Request a password-reset email
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PasswordResetRequest" }
      responses:
        "202":
          description: Accepted. Generic result regardless of whether the email exists.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/password-reset/confirm:
    post:
      operationId: confirmPasswordReset
      summary: Set a new password using a reset token
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PasswordResetConfirmRequest" }
      responses:
        "200":
          description: Password updated.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/meta:
    get:
      operationId: getMeta
      summary: Public deployment metadata (edition, enabled SSO providers)
      description: Lets the SPA gate edition-only UI (e.g. hide SSO in the open build) without a build-time bundle fork.
      tags: [meta]
      security: []
      responses:
        "200":
          description: Deployment metadata.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Meta" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/verify-email/resend:
    post:
      operationId: resendVerification
      summary: Resend the current user's email-verification link
      description: Idempotent; a no-op (still 202) if already verified. Requires a session.
      tags: [auth]
      responses:
        "202":
          description: If verification is pending, an email has been sent.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/me:
    get:
      operationId: currentUser
      summary: The current authenticated user
      description: Returns the session's user so the SPA can rehydrate auth on load; 401 if there is no valid session.
      tags: [auth]
      responses:
        "200":
          description: The authenticated user.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthUser" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Revoke the current session
      description: Idempotent — clears the cookie and revokes the session if present.
      tags: [auth]
      security: []
      responses:
        "204":
          description: Logged out.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/sso/{provider}/start:
    get:
      operationId: startSsoLogin
      summary: Begin an SSO login (enterprise)
      tags: [sso]
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string, enum: [google, microsoft] }
        - name: org
          in: query
          required: true
          description: Organization slug whose SSO config to use.
          schema: { type: string }
      responses:
        "200":
          description: The IdP redirect URL for the client to navigate to.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SsoRedirect" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/sso/{provider}/callback:
    get:
      operationId: ssoCallback
      summary: SSO callback (enterprise)
      tags: [sso]
      security: []
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string, enum: [google, microsoft] }
        - name: code
          in: query
          required: true
          schema: { type: string }
        - name: state
          in: query
          required: true
          schema: { type: string }
      responses:
        "302":
          description: Authenticated — session cookie set, browser redirected to the app.
          headers:
            Location: { schema: { type: string }, required: true }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/sso/{provider}:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: provider
        in: path
        required: true
        schema: { type: string, enum: [google, microsoft] }
    get:
      operationId: getSsoConfig
      summary: Read an SSO provider's config (enterprise) — never returns the secret
      tags: [sso]
      responses:
        "200":
          description: The provider config (no secret material — only a keyed fingerprint).
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SsoConfigView" }
        default: { $ref: "#/components/responses/Error" }
    put:
      operationId: setSsoConfig
      summary: Configure an SSO provider for an organization (enterprise)
      tags: [sso]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SsoConfigRequest" }
      responses:
        "204":
          description: Saved.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  # ---- CLI credential flow (S5.1) -------------------------------------------
  # `tunnex login` opens the system browser; auth completes IN-BROWSER (local or
  # SSO, MFA and all); the SPA then calls cliAuthorize and redirects the browser
  # to the CLI's loopback callback with a one-time code + state; the CLI
  # exchanges code+PKCE-verifier for a dedicated bearer credential (tnx_...).
  # Device-code fallback for browserless hosts. Codes and credentials are hashed
  # at rest; audit rows carry the keyed fingerprint (proof-of-secret convention).
  /api/v1/auth/cli/authorize:
    post:
      operationId: cliAuthorize
      summary: Mint a one-time CLI authorization code (browser leg)
      description: >
        COOKIE-SESSION ONLY (argued exception to bearer≡cookie): minting a new
        credential from an existing bearer credential would be self-replication —
        a stolen token could outlive its expiry by re-minting. The browser session
        is the human checkpoint. Verified email required. The redirect_uri must be
        a loopback (http://127.0.0.1:<port>/callback or http://[::1]:<port>/callback,
        any port, exactly that path — never a hostname). The code is single-use,
        expires in 60s, and is bound to this exact redirect_uri + PKCE challenge.
      tags: [cli-auth]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CliAuthorizeRequest" }
      responses:
        "200":
          description: One-time code minted; the SPA redirects the browser to the loopback.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CliAuthorizeResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/cli/token:
    post:
      operationId: cliToken
      summary: Exchange a one-time code (+ PKCE verifier) for a CLI credential
      description: >
        Public (the CLI holds no credential yet). The exchange requires the code,
        the PKCE verifier matching the challenge presented at authorize, and the
        EXACT redirect_uri the code was bound to. Any mismatch, reuse, or expiry
        → 400 invalid_grant. The credential is returned EXACTLY ONCE.
      tags: [cli-auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CliTokenRequest" }
      responses:
        "200":
          description: The dedicated CLI credential — shown exactly once, never re-served.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CliTokenResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/cli/credentials:
    get:
      operationId: listCliCredentials
      summary: List the caller's CLI credentials (metadata only — never tokens)
      tags: [cli-auth]
      responses:
        "200":
          description: The caller's credentials (fingerprints, never token material).
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CliCredential" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/cli/credentials/{credentialId}:
    delete:
      operationId: revokeCliCredential
      summary: Revoke one of the caller's CLI credentials (immediate)
      description: >
        Self-scoped (a caller revokes only their own credential). Allowed
        unverified — revoking a credential is logout-class, not org-mutating.
      tags: [cli-auth]
      parameters:
        - name: credentialId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Revoked (idempotent for an already-revoked credential).
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/cli/device:
    post:
      operationId: cliDeviceStart
      summary: Start the device-code fallback (browserless hosts)
      description: >
        Public. Returns a short user_code the user enters at verification_uri
        from any browser, and a device_code the CLI polls with. Same hygiene
        class as authorization codes — hashed at rest, single-use, short TTL.
      tags: [cli-auth]
      security: []
      responses:
        "200":
          description: Device flow started.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CliDeviceStartResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/cli/device/approve:
    post:
      operationId: cliDeviceApprove
      summary: Approve a device-code login (browser leg)
      description: >
        COOKIE-SESSION ONLY (same argued exception as cliAuthorize) + verified
        email required — this is the human checkpoint of the device flow.
      tags: [cli-auth]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CliDeviceApproveRequest" }
      responses:
        "200":
          description: Approved — the polling CLI will receive its credential.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GenericMessage" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/auth/cli/device/token:
    post:
      operationId: cliDeviceToken
      summary: Poll for the device-flow credential
      description: >
        Public. 400 authorization_pending until approved; expired/consumed codes
        → 400 invalid_grant. On approval the credential is returned EXACTLY ONCE.
      tags: [cli-auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CliDeviceTokenRequest" }
      responses:
        "200":
          description: The dedicated CLI credential — shown exactly once.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CliTokenResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/agent/enroll:
    post:
      operationId: enrollAgent
      summary: Enroll a tunnex-node agent with a join token
      tags: [nodes]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/EnrollRequest" }
      responses:
        "200":
          description: Enrolled — returns the signed agent certificate and the CA.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EnrollResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/nodes:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listNodes
      summary: List enrolled nodes
      tags: [nodes]
      responses:
        "200":
          description: Nodes.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Node" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/nodes/join-token:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: issueJoinToken
      summary: Issue a single-use node join token
      tags: [nodes]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/JoinTokenRequest" }
      responses:
        "201":
          description: The join token (shown once).
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/JoinTokenResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/nodes/{nodeId}/revoke:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: nodeId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: revokeNode
      summary: Revoke a node (renewal will be refused)
      tags: [nodes]
      responses:
        "204":
          description: Revoked.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/overview:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getOrgOverview
      summary: Dashboard overview — counts + recent activity
      tags: [organizations]
      responses:
        "200":
          description: Org overview.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrgOverview" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/audit-logs:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listAuditLogs
      summary: The org's audit log — filterable, keyset-paginated (read-only)
      tags: [organizations]
      parameters:
        - { name: actor, in: query, required: false, schema: { type: string, format: uuid }, description: Filter by acting user (must be an org member). }
        - { name: action, in: query, required: false, schema: { type: string } }
        - { name: from, in: query, required: false, schema: { type: string, format: date-time }, description: created_at >= this. }
        - { name: to, in: query, required: false, schema: { type: string, format: date-time }, description: created_at <= this. }
        # Keyset cursor: pass the last entry's created_at + id to fetch the next page.
        - { name: cursor_ts, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: cursor_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
      responses:
        "200":
          description: A page of audit entries, newest first. Fewer than `limit` means the last page.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AuditLogEntry" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/devices:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listDevices
      summary: List devices (own devices for members; all for admins)
      tags: [devices]
      responses:
        "200":
          description: Devices.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Device" } }
        default: { $ref: "#/components/responses/Error" }
    post:
      operationId: createDevice
      summary: Create a device/peer bound to the owning user
      tags: [devices]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateDeviceRequest" }
      responses:
        "201":
          description: The created device (with a one-time private key if server-generated).
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateDeviceResponse" }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/devices/{deviceId}/revoke:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: deviceId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: revokeDevice
      summary: Revoke a device (peer removed from the gateway within seconds)
      tags: [devices]
      responses:
        "204":
          description: Revoked.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  # ── Device posture (S7.3, ENTERPRISE) ───────────────────────────────────────
  # An org-level approval gate: new devices enroll PENDING (blocked) until approved.
  # Edition-gated: the open build returns 403 edition_required. RBAC: device:approve.
  /api/v1/organizations/{orgId}/devices/pending:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: listPendingDevices
      summary: The device-approval queue (enterprise)
      tags: [devices]
      responses:
        "200":
          description: Devices awaiting approval.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Device" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/devices/{deviceId}/approve:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: deviceId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: approveDevice
      summary: Approve a pending device (peer + grants land org-wide within seconds, enterprise)
      tags: [devices]
      responses:
        "204":
          description: Approved.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/devices/{deviceId}/reject:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
      - name: deviceId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: rejectDevice
      summary: Reject a pending device (revoked, tunnel address freed, enterprise)
      tags: [devices]
      responses:
        "204":
          description: Rejected.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
        default: { $ref: "#/components/responses/Error" }

  /api/v1/organizations/{orgId}/device-approval:
    parameters:
      - name: orgId
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getDeviceApproval
      summary: Get the org device-approval mode (enterprise)
      tags: [devices]
      responses:
        "200":
          description: Current mode.
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceApproval" }
        default: { $ref: "#/components/responses/Error" }
    put:
      operationId: setDeviceApproval
      summary: Set the org device-approval mode — enabling gates new enrollments (enterprise)
      tags: [devices]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeviceApproval" }
      responses:
        "200":
          description: Updated mode (with grandfathered count when enabling).
          headers: { X-Request-Id: { $ref: "#/components/headers/RequestId" } }
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceApproval" }
