  # ── Zero Trust policy (S7.1, ENTERPRISE) ────────────────────────────────────
  # Model only (groups, resources, allow-rules, org mode). Enforcement is S7.2.
  # Every endpoint is edition-gated: the open build returns 403 edition_required.
  /api/v1/organizations/{orgId}/groups:
