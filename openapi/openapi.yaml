      summary: The org's Zero Trust access/flow events — keyset-paginated (enterprise, read-only)
      tags: [organizations]
      parameters:
        - { name: denies_only, in: query, required: false, schema: { type: boolean, default: false }, description: Only deny/deny_aggregate/terminated events (the security feed). }
        # Keyset cursor: pass the last entry's created_at + id to fetch the next page.
        - { name: cursor_ts, in: query, required: false, schema: { type: string, format: date-time } }
        - { name: cursor_id, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 200, default: 100 } }
      responses:
