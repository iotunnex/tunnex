name: CI

# S6.0b: the verification gates, automated. Red BLOCKS merge on the two gate
# jobs (gates, client). The e2e job is OPPORTUNISTIC — if it proves flaky or
# resource-starved it moves to nightly/non-blocking (see PLAN S6.0b ledger).
#
# Electron is NEVER launched in CI (the client tests import no electron at
# runtime; typecheck/build need only its types), so ELECTRON_SKIP_BINARY_DOWNLOAD
# is set everywhere and no display/xvfb is needed. A launch-based
# playwright-electron target is deliberately out of scope (ledgered).

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  ELECTRON_SKIP_BINARY_DOWNLOAD: "1"

jobs:
  # Linux: the existing make gates + web typecheck/build. RED BLOCKS MERGE.
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Codegen drift guard
        run: make generate-check

      - name: Both editions — build + test (open + enterprise)
        run: |
          cp .env.example .env   # compose + make migrate read DATABASE_URL from here
          docker compose up -d --wait postgres
          make migrate
          make test-editions

      - name: Node agent — data-plane tests (reconcile idempotence)
        run: make test-node

      - name: Privilege-helper core — vet + test (S6.3)
        run: make test-helper

      - name: Privilege-helper — cross-compile darwin/amd64+arm64 + windows/amd64 (S6.3)
        run: make helper-crosscompile

      - name: Web — typecheck + build
        run: |
          corepack enable
          pnpm install --frozen-lockfile
          pnpm --filter @tunnex/web build

  # macOS + Windows: the desktop client. Display-free (no Electron launch).
  # RED BLOCKS MERGE — this is the cross-platform surface a human can't cover.
  client:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Native Windows build+vet+test of the privilege helper — the WFP backend pulls
      # wireguard/windows + wintun, which the linux cross-compile can't fully exercise.
      # RED BLOCKS MERGE. (macOS helper build stays on the cross-compile gate.)
      - uses: actions/setup-go@v5
        if: matrix.os == 'windows-latest'
        with:
          go-version: '1.25'
          cache-dependency-path: apps/helper/go.sum
      - name: Helper — native Windows build + vet + test (WFP deps)
        if: matrix.os == 'windows-latest'
        working-directory: apps/helper
        env:
          GOFLAGS: -mod=readonly
        run: |
          go build ./...
          go vet ./...
          go test ./...
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install (electron binary skipped — CI never launches it)
        run: |
          corepack enable
          pnpm install --frozen-lockfile
      - name: Client — typecheck
        run: pnpm --filter @tunnex/client run typecheck
      - name: Client — unit tests
        run: pnpm --filter @tunnex/client test
      - name: Client — build
        run: pnpm --filter @tunnex/client build

      # Package the Windows installer NATIVELY on Windows. A macOS-cross-built NSIS
      # uninstaller fails its integrity check on Windows ("Installer integrity check has
      # failed") — a Windows-native build fixes it, so Add/Remove Programs → Uninstall
      # works from the UI. Uploaded as a downloadable artifact (unsigned; S6.5b signs).
      - name: Client — package Windows installer (native)
        if: matrix.os == 'windows-latest'
        shell: bash
        env:
          GOFLAGS: -mod=readonly
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: |
          pnpm --filter @tunnex/web build
          bash apps/client/scripts/stage-helper.sh win
          pnpm --filter @tunnex/client exec electron-builder --win --x64 --config electron-builder.yml
          bash apps/client/scripts/sha256sums.sh
      - name: Upload Windows installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: tunnex-windows-installer
          path: |
            apps/client/release/*.exe
            apps/client/release/SHA256SUMS
          if-no-files-found: error

  # Full stack + Playwright. OPPORTUNISTIC: kept green when it can be, but if it
  # resists (resource limits / flakiness) demote to nightly (PLAN ledger) rather
  # than block merges on infra noise.
  e2e:
    runs-on: ubuntu-latest
    # OPPORTUNISTIC / NON-BLOCKING by design (S6.0b mandate: full e2e in CI is
    # opportunistic). The gates + client jobs are the merge gates; this job spins
    # the whole stack and is inherently heavier/flakier, so it never blocks merge.
    # (The early-run build failures were the -mod=readonly root cause — a module
    # graph re-resolution that git-ls-remote'd the mismatched module path — now
    # fixed repo-wide, so this job is expected to pass.)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Bring up the stack + seed
        run: |
          cp .env.example .env
          docker compose up -d --build --wait
          make seed
      - name: Playwright e2e (SPA → API)
        run: |
          docker run --rm --network tunnex_default \
            -v "$PWD/e2e":/e2e -w /e2e -e E2E_BASE_URL=http://nginx:8080 \
            mcr.microsoft.com/playwright:v1.48.2-jammy \
            sh -c "npm install --no-audit --no-fund --silent && npx playwright test"

  # S6.6 zero-build deploy: publish the prebuilt, MULTI-ARCH (amd64+arm64) service images to ghcr
  # so a customer never builds from source. Runs ONLY on a push (never PRs) and ONLY after the
  # gates pass. main pushes publish :latest + :sha (opt-in / main-tracking); a v* release tag
  # publishes the reproducible :vX.Y.Z that deploy/tunnex.yml pins via ${TUNNEX_VERSION}.
  publish:
    if: github.event_name == 'push'
    needs: [gates]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image:
          - { name: api, dockerfile: deploy/docker/api.Dockerfile }
          - { name: web, dockerfile: deploy/docker/web.Dockerfile }
          - { name: nginx, dockerfile: deploy/docker/nginx.Dockerfile }
          - { name: node-agent, dockerfile: deploy/docker/node.Dockerfile }
          - { name: migrate, dockerfile: deploy/docker/migrate.Dockerfile }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3 # arm64 emulation for the multi-arch build
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-${{ matrix.image.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,enable={{is_default_branch}}
            type=ref,event=tag
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
