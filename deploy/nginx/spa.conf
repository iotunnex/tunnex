server {
    # 8080 so the container runs fully non-root (nginx-unprivileged image).
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache hashed assets; the Vite build fingerprints filenames.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all app routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
