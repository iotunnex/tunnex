# Edge reverse proxy. Single entrypoint on :80 (TLS terminates here in S11.3).
# Upstreams use docker-compose service names.

upstream tunnex_api {
    server api:8080;
}

upstream tunnex_web {
    server web:80;
}

server {
    listen 80;
    server_name _;

    # Propagate a correlation ID to the API if the client didn't send one.
    proxy_set_header X-Request-ID $request_id;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API health passthrough.
    location = /healthz {
        proxy_pass http://tunnex_api;
    }

    # Versioned API surface.
    location /api/ {
        proxy_pass http://tunnex_api;
    }

    # Everything else is the SPA.
    location / {
        proxy_pass http://tunnex_web;
    }
}
